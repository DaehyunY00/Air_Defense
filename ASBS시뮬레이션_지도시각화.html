/* ============================================================
   통계 + C2 화면 갱신
   ============================================================ */
function updateStatsAndC2(mode){
  const data = SIM_STATE[mode];
  if(!data) return;
  const t = SIM_STATE.currentTime;
  const events = data.events.filter(e => e.t <= t);
  const tracks = data.tracks;

  // 각 항적 상태 계산
  const trackState = {}; // trackId -> {phase, success?, ...}
  events.forEach(e => {
    if(e.trackId === 'SYS') return;
    if(!trackState[e.trackId]) trackState[e.trackId] = {phase:'none'};
    const ph = e.kind;
    trackState[e.trackId].lastPhase = ph;
    trackState[e.trackId].lastEvent = e;
    if(e.final){
      trackState[e.trackId].final = true;
      trackState[e.trackId].success = e.success === true;
    }
  });

  // 통계 계산
  let detected = 0, classified = 0, decided = 0, engaged = 0, success = 0, fail = 0, missed = 0;
  let waitingDecision = 0, voiceCount = 0, undetectedCount = 0;
  let modeCounts = {preauth:0, auto:0, verify:0, delegate:0};
  tracks.forEach(tr=>{
    const st = trackState[tr.id];
    if(!st){ undetectedCount++; return; }
    if(st.final){
      if(st.success) success++;
      else fail++;
      return;
    }
    // 진행 중
    const ph = st.lastPhase;
    if(ph === 'ev-detect' || ph === 'ev-track') detected++;
    if(ph === 'ev-classify') {classified++; waitingDecision++;}
    if(ph === 'ev-wait') waitingDecision++;
    if(ph === 'ev-decide' || ph === 'ev-assign') decided++;
    if(ph === 'ev-order' || ph === 'ev-engage') engaged++;
    if(ph === 'ev-miss') missed++;
    if(ph === 'ev-voice') voiceCount++;
  });
  // 모드별 카운트 (To-Be)
  if(mode === 'tobe'){
    tracks.forEach(tr=>{
      const e = events.find(x => x.trackId === tr.id && x.kind === 'ev-decide');
      if(e && e.mode) modeCounts[e.mode]++;
    });
  }
  // 시스템 이벤트 음성 카운트
  voiceCount = events.filter(e => e.kind === 'ev-voice').length;

  // 통계 박스 갱신
  const statsEl = document.getElementById('sim-stats-'+mode);
  if(statsEl){
    statsEl.innerHTML = `
      <div class="stat-box info"><div class="sk">시뮬 시각</div><div class="sv">${fmtT(t)}</div><div class="sd">/ T+30:00</div></div>
      <div class="stat-box info"><div class="sk">총 항적</div><div class="sv">${tracks.length}</div><div class="sd">탐지 ${tracks.filter(tr=>trackState[tr.id]).length} / 미탐지 ${undetectedCount}</div></div>
      <div class="stat-box good"><div class="sk">격추</div><div class="sv">${success}</div><div class="sd">SSKP 기반</div></div>
      <div class="stat-box bad"><div class="sk">표적 도달 / 실패</div><div class="sv">${fail}</div><div class="sd">격추 실패+도달</div></div>
      <div class="stat-box warn"><div class="sk">처리 중</div><div class="sv">${detected+classified+decided+engaged}</div><div class="sd">탐지~교전</div></div>
      <div class="stat-box ${mode==='asis'?'warn':''}"><div class="sk">음성/VTC 이벤트</div><div class="sv">${voiceCount}</div><div class="sd">${mode==='asis'?'협조 채널':'시스템 메시지'}</div></div>
    `;
  }

  // To-Be 모드 카운트 갱신
  if(mode === 'tobe'){
    const mp = document.getElementById('mc-preauth'); if(mp) mp.innerHTML = `${modeCounts.preauth}<span class="total">/4</span>`;
    const ma = document.getElementById('mc-auto'); if(ma) ma.innerHTML = `${modeCounts.auto}<span class="total">/6</span>`;
    const mv = document.getElementById('mc-verify'); if(mv) mv.innerHTML = `${modeCounts.verify}<span class="total">/8</span>`;
    const md = document.getElementById('mc-delegate'); if(md) md.innerHTML = `${modeCounts.delegate}<span class="total">/12</span>`;
  }

  // C2 화면 갱신
  if(mode === 'asis'){
    updateAsIsC2Views(t, events, tracks, trackState);
  } else {
    updateToBeC2Views(t, events, tracks, trackState);
  }
}

/* ============================================================
   As-Is C2 화면 갱신 - 4분할 (KAOC/MCRC/ADC2A/KNTDS)
   각 C2별로 자기 자산만 보이고, 다른 C2의 발사는 미인지
   ============================================================ */
function updateAsIsC2Views(t, events, tracks, trackState){
  const c2List = ['KAOC','MCRC','ADC2A','KNTDS'];
  const c2Map = {KAOC:'KAOC', MCRC:'MCRC', ADC2A:'ADC2A', KNTDS:'KNTDS'};

  c2List.forEach(c2Name => {
    const c2Internal = c2Map[c2Name];
    // 이 C2에 직접 보고된 이벤트만 (As-Is의 정보 분절)
    const myEvents = events.filter(e => e.c2 === c2Internal || (e.actor && e.actor.includes(c2Name)));
    // 결심 대기 (이 C2가 처리해야 할 항적)
    const myTracks = tracks.filter(tr => {
      const evs = events.filter(e => e.trackId === tr.id);
      return evs.some(e => e.c2 === c2Internal);
    });
    const myActive = myTracks.filter(tr => {
      const st = trackState[tr.id];
      return st && !st.final;
    }).length;
    const myDone = myTracks.filter(tr => trackState[tr.id]?.success === true).length;
    const myFail = myTracks.filter(tr => trackState[tr.id]?.final && !trackState[tr.id]?.success).length;

    // 음성 메시지 카운트
    const myVoice = events.filter(e => e.kind === 'ev-voice' &&
      (e.actor?.includes(c2Name) || e.c2 === c2Internal || (c2Name==='KAOC' && (e.actor?.includes('합참') || e.actor?.includes('KAOC') || e.actor?.includes('KAMDOC'))))).length;

    // 화면 본문
    const bodyEl = document.getElementById('c2-'+c2Name.toLowerCase()+'-body');
    if(bodyEl){
      const concurrentWarn = myActive > 5 ? '<span class="bad">⚠ 음성처리 한계 초과</span>' : myActive > 3 ? '<span class="warn">처리 부담</span>' : '<span class="good">정상</span>';
      bodyEl.innerHTML = `
        <div class="c2-stat-row"><span class="stat-k">담당 항적</span><span class="stat-v">${myTracks.length}</span></div>
        <div class="c2-stat-row"><span class="stat-k">처리 중</span><span class="stat-v ${myActive>5?'bad':myActive>3?'warn':''}">${myActive}</span></div>
        <div class="c2-stat-row"><span class="stat-k">상태</span><span class="stat-v">${concurrentWarn}</span></div>
        <div class="c2-stat-row"><span class="stat-k">격추</span><span class="stat-v good">${myDone}</span></div>
        <div class="c2-stat-row"><span class="stat-k">실패/도달</span><span class="stat-v ${myFail?'bad':''}">${myFail}</span></div>
        <div class="c2-stat-row"><span class="stat-k">음성/VTC</span><span class="stat-v ${myVoice>4?'warn':''}">${myVoice}</span></div>
      `;
    }

    // 로그 (최근 10개)
    const logEl = document.getElementById('c2-'+c2Name.toLowerCase()+'-log');
    if(logEl){
      const recent = myEvents.slice(-8);
      logEl.innerHTML = recent.map(e => {
        const isVoice = e.kind === 'ev-voice';
        const isSucc = e.kind === 'ev-bda-success';
        const isFail = e.kind === 'ev-bda-fail';
        const isMiss = e.kind === 'ev-miss';
        const cls = isVoice ? 'voice' : isSucc ? 'success' : (isFail || isMiss) ? 'fail' : '';
        const trackId = e.trackId === 'SYS' ? 'SYS' : e.trackId;
        return `<div class="log-row ${cls}"><span class="t">${fmtT(e.t)}</span>[${trackId}] ${esc(e.text || '')}</div>`;
      }).join('') || '<div class="log-row muted">— 메시지 없음 —</div>';
      // 다른 C2의 발사를 미인지하는 것을 강조 - "발사 미인지" 메시지 추가
      const otherFires = events.filter(e => e.kind === 'ev-engage' && e.c2 !== c2Internal && e.actor !== 'BDA');
      // 만약 본인 AOR과 겹치는 다른 C2 발사가 있으면 (시연용 단순화: 시간 근접)
      if(myEvents.length > 0 && otherFires.length > myEvents.length && t > 600){
        const note = `<div class="log-row miss">⚠ 다른 군 ${otherFires.length}건 발사 진행 — 즉시 자동 반영 안됨 (전화 확인 필요)</div>`;
        logEl.innerHTML += note;
      }
    }
  });
}

/* ============================================================
   To-Be C2 화면 갱신 - 통합 COP + 4분할 (4분기 모드별)
   ============================================================ */
function updateToBeC2Views(t, events, tracks, trackState){
  const bodyEl = document.getElementById('c2-tobe-body');
  if(!bodyEl) return;
  const modes = {preauth:{label:'④ 사전승인 자동교전', cls:'kaoc', detail:'탄도탄 / ROE 사전위임'},
                 auto:   {label:'① 자동채택',         cls:'mcrc', detail:'순항 6 / 신뢰도≥0.85'},
                 verify: {label:'② 인간검증',         cls:'adc2a',detail:'순항 2 + 전투기 6 / KAOC 결심'},
                 delegate:{label:'③ 분권위임',        cls:'kntds',detail:'무인기 12 / 작전사+동적 SADC'}};
  // 모드별 통계
  bodyEl.innerHTML = ['preauth','auto','verify','delegate'].map(m=>{
    const myTracks = tracks.filter(tr => {
      const e = events.find(x => x.trackId === tr.id && x.kind === 'ev-decide');
      return e && e.mode === m;
    });
    const done = myTracks.filter(tr => trackState[tr.id]?.success === true).length;
    const fail = myTracks.filter(tr => trackState[tr.id]?.final && !trackState[tr.id]?.success).length;
    const active = myTracks.filter(tr => trackState[tr.id] && !trackState[tr.id].final).length;
    const md = modes[m];
    return `<div style="background:var(--bg-card); border-radius:5px; padding:9px 11px; border-left:3px solid ${m==='preauth'?'var(--c-mode-preauth)':m==='auto'?'var(--c-mode-auto)':m==='verify'?'var(--c-mode-verify)':'var(--c-mode-delegate)'}">
      <div style="font-size:11px; font-weight:600; color:${m==='preauth'?'var(--c-mode-preauth)':m==='auto'?'var(--c-mode-auto)':m==='verify'?'var(--c-mode-verify)':'var(--c-mode-delegate)'}; margin-bottom:4px">${md.label}</div>
      <div style="font-size:10px; color:var(--text-muted); margin-bottom:6px">${md.detail}</div>
      <div class="c2-stat-row"><span class="stat-k">활성</span><span class="stat-v">${active}</span></div>
      <div class="c2-stat-row"><span class="stat-k">격추</span><span class="stat-v good">${done}</span></div>
      <div class="c2-stat-row"><span class="stat-k">실패</span><span class="stat-v ${fail?'bad':''}">${fail}</span></div>
    </div>`;
  }).join('');

  // 통합 로그 (최근 10개)
  const logEl = document.getElementById('c2-tobe-log');
  if(logEl){
    const recent = events.slice(-10);
    logEl.innerHTML = recent.map(e => {
      const isVoice = e.kind === 'ev-voice';
      const isSucc = e.kind === 'ev-bda-success';
      const isFail = e.kind === 'ev-bda-fail';
      const cls = isVoice ? 'voice' : isSucc ? 'success' : isFail ? 'fail' : '';
      const trackId = e.trackId === 'SYS' ? 'SYS' : e.trackId;
      return `<div class="log-row ${cls}"><span class="t">${fmtT(e.t)}</span>[${trackId}] <span class="muted">${esc(e.actor||'')}</span> ${esc(e.text || '')}</div>`;
    }).join('') || '<div class="log-row muted">— 메시지 없음 —</div>';
  }
}

/* ============================================================
   재생 컨트롤
   ============================================================ */
function playSim(){
  if(SIM_STATE.currentTime >= SIM_CONFIG.scenarioDurationSec){
    SIM_STATE.currentTime = 0;
    updateSimViews();
  }
  SIM_STATE.playing = true;
  SIM_STATE.lastRealTime = performance.now();
  // 버튼 텍스트 갱신
  document.querySelectorAll('[id^="btn-play-"]').forEach(b=>{
    b.textContent = '❚❚ 일시정지';
    b.classList.remove('primary'); b.classList.add('danger');
  });
  const step = (now)=>{
    if(!SIM_STATE.playing) return;
    const dt = (now - SIM_STATE.lastRealTime) / 1000;
    SIM_STATE.lastRealTime = now;
    if(SIM_STATE.playSpeed >= 9999){
      SIM_STATE.currentTime = SIM_CONFIG.scenarioDurationSec;
    } else {
      SIM_STATE.currentTime += dt * SIM_STATE.playSpeed;
    }
    if(SIM_STATE.currentTime >= SIM_CONFIG.scenarioDurationSec){
      SIM_STATE.currentTime = SIM_CONFIG.scenarioDurationSec;
      updateSimViews();
      pauseSim();
      showToast('시뮬레이션 완료 (T+30:00)');
      return;
    }
    updateSimViews();
    SIM_STATE.rafId = requestAnimationFrame(step);
  };
  SIM_STATE.rafId = requestAnimationFrame(step);
}
function pauseSim(){
  SIM_STATE.playing = false;
  if(SIM_STATE.rafId) cancelAnimationFrame(SIM_STATE.rafId);
  document.querySelectorAll('[id^="btn-play-"]').forEach(b=>{
    b.textContent = '▶ 재생';
    b.classList.remove('danger'); b.classList.add('primary');
  });
}

/* ============================================================
   항적 상세 패널
   ============================================================ */
function openTrackDetail(mode, trackId){
  const data = SIM_STATE[mode];
  if(!data) return;
  const tr = data.tracks.find(x => x.id === trackId);
  if(!tr) return;
  const evs = data.events.filter(e => e.trackId === trackId).sort((a,b)=>a.t-b.t);
  const detailEl = document.getElementById('tdp-content');
  const finalEv = evs.find(e => e.final);
  detailEl.innerHTML = `
    <h3 style="color:#fff; font-size:14px; margin-bottom:4px">${tr.id} · ${tr.label} <span class="muted small">(${tr.threatModel})</span></h3>
    <div class="muted small" style="margin-bottom:10px">표적: ${esc(tr.target)} · 도래 ${fmtT(tr.arrivalT)} · 발사 ${fmtT(tr.launchT)}</div>
    <div style="background:${finalEv?.success ? 'rgba(102,187,106,0.1)' : finalEv?.final ? 'rgba(239,83,80,0.1)' : 'rgba(255,167,38,0.1)'}; border:1px solid ${finalEv?.success ? 'var(--c-success)' : finalEv?.final ? 'var(--c-fail)' : 'var(--c-warn)'}; padding:6px 9px; border-radius:4px; font-size:12px; margin-bottom:10px">
      <b>결과:</b> ${finalEv ? (finalEv.success ? '✓ 격추 성공' : '✗ 표적 도달 / 격추 실패') : '진행 중'}<br>
      ${finalEv ? `사용 자산: ${finalEv.shooter ? getShooterName(finalEv.shooter) : '—'}, 발사 ${finalEv.shotCount || 0}발${finalEv.dup ? ', 중복교전 발생' : ''}` : ''}
    </div>
    <h4 style="color:var(--text-secondary); font-size:11px; margin-bottom:6px">킬체인 이벤트</h4>
    <div class="tdp-event-list">
      ${evs.map(e => `<div class="tdp-event ${e.kind}">
        <span class="tdp-t">${fmtT(e.t)}</span>
        <span class="tdp-actor">[${esc(e.actor || '—')}]</span>
        <div class="tdp-text">${esc(e.text || '')}</div>
      </div>`).join('')}
    </div>
  `;
  document.getElementById('track-detail').classList.add('open');
}
function closeTrackDetail(){
  document.getElementById('track-detail').classList.remove('open');
}

/* ============================================================
   탭 6: 비교 분석
   ============================================================ */
function renderCompare(){
  const el = document.getElementById('pane-compare');
  if(!SIM_STATE.asis || !SIM_STATE.tobe){
    runSimulations(Date.now() & 0x7FFFFFFF);
  }
  // 최종 결과 (T+30:00 기준) - 전체 이벤트
  const aS = SIM_STATE.asis.stats;
  const tS = SIM_STATE.tobe.stats;
  const byType = ['ballistic','cruise','aircraft','uav'];
  const typeLabels = {ballistic:'탄도탄', cruise:'순항미사일', aircraft:'전투기', uav:'무인기'};

  // As-Is 음성 메시지 vs To-Be 데이터 메시지
  const asisVoice = SIM_STATE.asis.events.filter(e=>e.kind==='ev-voice').length;
  const tobeVoice = SIM_STATE.tobe.events.filter(e=>e.kind==='ev-voice').length;

  // 평균 결심 시간 (탐지 → 결심)
  const avgDecision = (data) => {
    const arr = [];
    data.tracks.forEach(tr => {
      const det = data.events.find(e => e.trackId === tr.id && e.kind === 'ev-detect');
      const dec = data.events.find(e => e.trackId === tr.id && e.kind === 'ev-decide');
      if(det && dec) arr.push(dec.t - det.t);
    });
    return arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : 0;
  };
  const asisAvgDec = avgDecision(SIM_STATE.asis);
  const tobeAvgDec = avgDecision(SIM_STATE.tobe);

  // 중복교전 수
  const asisDup = SIM_STATE.asis.events.filter(e => e.dup).length;
  const tobeDup = SIM_STATE.tobe.events.filter(e => e.dup).length;

  el.innerHTML = `
    <div class="sim-control">
      <span style="font-weight:600; color:var(--text-primary)">최종 결과 비교</span>
      <span class="muted">|</span>
      <button class="btn" onclick="pauseSim(); runSimulations(Date.now() & 0x7FFFFFFF); renderCompare(); showToast('재실행 완료. seed=' + SIM_STATE.seed);">🎲 새 시드로 재실행</button>
      <span class="muted small">seed: <code>${SIM_STATE.seed}</code></span>
    </div>

    <div class="cmp-summary">
      <h2 style="font-size:14px; color:var(--text-primary)">최종 처리 결과 (T+30:00 기준)</h2>
      <table class="cmp-table">
        <thead>
          <tr><th>지표</th><th class="h-asis">As-Is (현재 체계)</th><th class="h-tobe">To-Be (통합방공체계)</th><th>개선효과</th></tr>
        </thead>
        <tbody>
          <tr><td class="label">전체 격추 (30개 중)</td><td class="asis"><b>${aS.success}</b> / 30 (${(aS.success/30*100).toFixed(0)}%)</td><td class="tobe"><b>${tS.success}</b> / 30 (${(tS.success/30*100).toFixed(0)}%)</td><td class="hl-good">+${tS.success - aS.success}</td></tr>
          <tr><td class="label">표적 도달/실패</td><td class="asis"><b>${aS.fail+aS.undetected}</b></td><td class="tobe"><b>${tS.fail+tS.undetected}</b></td><td class="hl-good">−${(aS.fail+aS.undetected)-(tS.fail+tS.undetected)}</td></tr>
          ${byType.map(t => `<tr><td class="label">└ ${typeLabels[t]} 격추</td><td class="asis">${aS.byType[t].s} / ${aS.byType[t].total}</td><td class="tobe">${tS.byType[t].s} / ${tS.byType[t].total}</td><td>+${tS.byType[t].s - aS.byType[t].s}</td></tr>`).join('')}
          <tr><td class="label">평균 탐지→결심 지연</td><td class="asis"><b>${asisAvgDec.toFixed(0)}s</b> (${(asisAvgDec/60).toFixed(1)}분)</td><td class="tobe"><b>${tobeAvgDec.toFixed(0)}s</b> (${(tobeAvgDec/60).toFixed(1)}분)</td><td class="hl-good">−${(asisAvgDec-tobeAvgDec).toFixed(0)}s</td></tr>
          <tr><td class="label">총 발사 (인터셉터)</td><td class="asis">${aS.totalShots}</td><td class="tobe">${tS.totalShots}</td><td>—</td></tr>
          <tr><td class="label">중복교전 (AOR 중첩)</td><td class="asis"><b class="hl-bad">${asisDup}</b></td><td class="tobe"><b>${tobeDup}</b></td><td class="hl-good">−${asisDup - tobeDup}</td></tr>
          <tr><td class="label">음성/VTC 이벤트</td><td class="asis"><b class="hl-warn">${asisVoice}</b></td><td class="tobe">${tobeVoice}</td><td class="hl-good">−${asisVoice - tobeVoice} (데이터화 전환)</td></tr>
        </tbody>
      </table>
    </div>

    <div class="compare-grid">
      <div class="card asis">
        <h2>As-Is 핵심 관찰</h2>
        <ul>
          ${aS.byType.ballistic.f > 0 ? `<li class="hl-bad">탄도탄 ${aS.byType.ballistic.f}발이 표적 도달 — VTC 소집 5분 동안 도래</li>` : '<li>탄도탄 모두 격추 (운 좋은 시드)</li>'}
          ${asisDup > 0 ? `<li class="hl-warn">중복교전 ${asisDup}건 — 군별 AOR 중첩, 음성 협조 한계</li>` : ''}
          ${asisVoice > 15 ? `<li class="hl-warn">음성/VTC 메시지 ${asisVoice}건 — 30개 항적 처리에 따른 음성 매개 폭증</li>` : ''}
          <li>육군 저고도(천마/신궁) 발사가 MCRC/KAMDOC에 즉시 미반영 → 전화 확인 지연</li>
          <li>다른 C2 발사를 미인지하여 중복 할당 가능 → C2별 화면 단절 확인 가능</li>
        </ul>
      </div>
      <div class="card tobe">
        <h2>To-Be 핵심 관찰</h2>
        <ul>
          <li><span class="hl-good">탄도탄 사전승인 자동교전</span>으로 별도 결심 없이 즉시 L-SAM/천궁-II 발사</li>
          <li>4분기 모드 동시 작동 — 30개 항적이 모드별 분산 처리</li>
          <li>분권위임으로 1군단/수방사/이지스 CIC가 무인기 12대 병렬 처리</li>
          <li>KAOC 작전본부장이 결심하는 건 30개 중 ${tS.byTrack ? Object.values(tS.byTrack).filter(b=>b.events.some(e=>e.mode==='verify')).length : 8}건만 — <span class="hl-good">결심권의 분배(분산)</span></li>
          <li>중복교전 거의 없음 (통합 매칭) · 음성/VTC 폭증 없음 (데이터화)</li>
        </ul>
      </div>
    </div>

    <div class="card">
      <h2>해석 — 본 시뮬레이션이 보여주는 본질</h2>
      <p><b>① 시간 압박이 인지 부담을 만나면 As-Is는 작동 한계를 넘는다.</b><br>
      탄도탄 4발 도래까지 5~7분, 합참 VTC 소집까지 5분. 그동안 음성으로 자산 매칭 협의는 30개 항적 규모에서 불가능. As-Is는 시뮬레이션상에서 항상 일부 탄도탄이 표적에 도달하거나, 음성 처리 한계로 일부 항적은 결심조차 받지 못함.</p>
      <p><b>② To-Be는 결심권을 사라지게 하는 게 아니라 분배한다.</b><br>
      4분기 처리 모드에서 KAOC 작전본부장이 직접 결심하는 건 8건. 22건은 자동·분권으로 처리. 분권은 결심권의 사라짐이 아니라 분배이며, 30개 항적 살아남기 가능한 구조가 된다.</p>
      <p><b>③ 지역·국지의 평시 분리는 유지하되 작전 통제는 통합으로.</b><br>
      To-Be에서는 무인기 12대 분권위임으로 국지 자산(천마/신궁/비호)이 광역 KAOC 통제 하에서 운용. 군별 경계를 넘는 통합 매칭이 자동으로 일어남.</p>
      <p class="muted small">⚠ 본 시뮬레이션은 EADSIM 논리의 단순화된 통계 모델로, 매 실행마다 다른 결과를 생성합니다. 새 시드로 반복 실행하여 분포 경향을 확인하실 수 있습니다.</p>
    </div>
  `;
}
function updateCompareViews(){ /* 정적, 갱신 없음 */ }

/* ============================================================
   토스트
   ============================================================ */
function showToast(msg){
  const el = document.getElementById('sim-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>{ el.classList.remove('show'); }, 2400);
}

/* ============================================================
   초기화
   ============================================================ */
window.addEventListener('DOMContentLoaded', ()=>{
  // 탭 클릭
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick = ()=> switchTab(btn.dataset.tab);
  });
  // 키보드 단축키
  document.addEventListener('keydown', e=>{
    if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if(e.code === 'Space'){ e.preventDefault(); if(SIM_STATE.playing) pauseSim(); else playSim(); }
    if(e.code === 'KeyR'){ pauseSim(); SIM_STATE.currentTime = 0; updateSimViews(); }
    if(e.code === 'Escape'){ closeTrackDetail(); }
  });
  // 초기 시뮬레이션 실행
  runSimulations(Date.now() & 0x7FFFFFFF);
  // 첫 탭 렌더
  renderOverview();
});

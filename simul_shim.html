<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>KJADS — 복합위협 대응 시나리오 v5</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060e1a;--bg2:#0a1422;--bg3:#0f1c30;
  --b:#182e50;--b2:#223d6a;
  --t:#a8c8e8;--t2:#5878a0;--t3:#304060;
  --red:#e02020;--red2:#ff3a3a;--rdim:rgba(224,32,32,.18);
  --grn:#18b050;--grn2:#38d070;--gdim:rgba(24,176,80,.14);
  --amb:#d07818;--amb2:#f8b030;--adim:rgba(208,120,24,.16);
  --blu:#1868c0;--blu2:#50a0f8;--bdim:rgba(24,104,192,.16);
  --cyn:#18a8c0;--cyn2:#40d0e8;
  --pur:#7030c0;--pur2:#a060f0;
  --orn:#d05018;--orn2:#f07838;
  --mono:'Share Tech Mono',monospace;
  --sans:'Noto Sans KR',sans-serif;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--t);font-family:var(--sans);font-size:12px;display:flex;flex-direction:column;}

.hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--bg2);border-bottom:1px solid var(--b);flex-shrink:0;z-index:2000;position:relative;}
.hdr-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--t2);}
.hdr-title em{color:var(--red2);font-style:normal;}
.mode-wrap{display:flex;gap:5px;}
.mbtn{padding:3px 12px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:var(--mono);font-size:9px;cursor:pointer;transition:.2s;}
.mbtn.ar{background:var(--red);border-color:var(--red);color:#fff;}
.mbtn.ak{background:var(--grn);border-color:var(--grn);color:#000;}
.t-disp{font-family:var(--mono);font-size:13px;color:var(--amb2);min-width:72px;text-align:right;}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0;}
.sdot.live{background:var(--red2);box-shadow:0 0 7px var(--red2);animation:bl 1s infinite;}
@keyframes bl{0%,100%{opacity:1;}50%{opacity:.3;}}

.main{display:grid;grid-template-columns:1fr 320px;grid-template-rows:1fr auto;flex:1;min-height:0;}
.map-wrap{position:relative;overflow:hidden;border-right:1px solid var(--b);}
#map{width:100%;height:100%;}

.popup{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);min-width:270px;max-width:360px;background:rgba(10,20,34,.97);border:1px solid var(--amb);padding:10px 14px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:3000;}
.popup.show{opacity:1;}
.popup.up{border-color:var(--blu2);}
.popup.dn{border-color:var(--grn2);}
.popup.fl{border-color:var(--red2);}
.popup.at{border-color:var(--cyn2);}
.popup.warn{border-color:var(--orn2);}
.pop-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--amb2);margin-bottom:2px;}
.popup.up .pop-lbl{color:var(--blu2);}
.popup.dn .pop-lbl{color:var(--grn2);}
.popup.fl .pop-lbl{color:var(--red2);}
.popup.at .pop-lbl{color:var(--cyn2);}
.popup.warn .pop-lbl{color:var(--orn2);}
.pop-ttl{font-size:11px;font-weight:700;margin-bottom:4px;}
.pop-body{font-size:10px;color:var(--t2);line-height:1.55;}
.pop-body b{color:var(--amb2);}
.popup.up .pop-body b{color:var(--blu2);}
.popup.dn .pop-body b{color:var(--grn2);}
.popup.fl .pop-body b{color:var(--red2);}
.popup.at .pop-body b{color:var(--cyn2);}
.popup.warn .pop-body b{color:var(--orn2);}
.pop-foot{margin-top:4px;font-family:var(--mono);font-size:7px;color:var(--t3);}

.alert{position:absolute;top:6px;left:6px;right:6px;padding:5px 10px;background:var(--rdim);border:1px solid var(--red);font-family:var(--mono);font-size:9px;color:var(--red2);letter-spacing:1px;opacity:0;transition:opacity .3s;z-index:2500;}
.alert.show{opacity:1;}
.alert.ok{background:var(--gdim);border-color:var(--grn);color:var(--grn2);}
.alert.info{background:var(--bdim);border-color:var(--blu2);color:var(--blu2);}
.alert.warn{background:var(--adim);border-color:var(--orn2);color:var(--orn2);}

.zone-panel{position:absolute;bottom:8px;left:8px;background:rgba(10,20,34,.95);border:1px solid var(--b2);padding:7px 9px;z-index:2500;width:340px;}
.zp-title{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--t3);margin-bottom:5px;}
.zp-zone{margin-bottom:4px;padding:4px 5px;background:var(--bg3);border-left:3px solid;}
.zp-zone.west{border-color:#2870c8;}
.zp-zone.mid{border-color:#f8b030;}
.zp-zone.east{border-color:#18b050;}
.zp-zhdr{font-family:var(--mono);font-size:8px;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
.zp-zname{font-weight:700;letter-spacing:1px;}
.zp-zstat{color:var(--t3);font-size:7px;}
.zp-assets{display:flex;flex-wrap:wrap;gap:2px;}
.zp-asset{font-family:var(--mono);font-size:7px;padding:1px 4px;background:rgba(0,0,0,.3);border:1px solid var(--b);border-radius:2px;transition:.2s;}
.zp-asset.ready{color:var(--t2);}
.zp-asset.best{background:var(--grn);color:#000;border-color:var(--grn2);box-shadow:0 0 6px var(--grn);font-weight:700;}
.zp-asset.firing{background:var(--amb);color:#000;border-color:var(--amb2);animation:pulse 0.6s infinite;}
.zp-asset.engaged{background:var(--bdim);color:var(--blu2);border-color:var(--blu2);}
.zp-asset.conflict{background:var(--adim);color:var(--orn2);border-color:var(--orn2);animation:flash 0.4s infinite;font-weight:700;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes flash{0%,100%{box-shadow:0 0 0 var(--orn2);}50%{box-shadow:0 0 8px var(--orn2);}}

.bs-panel{position:absolute;bottom:8px;right:8px;background:rgba(10,20,34,.95);border:1px solid var(--b2);padding:8px 10px;min-width:210px;z-index:2500;max-width:250px;}
.bs-title{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--t3);margin-bottom:5px;}
.bs-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;padding:3px 5px;background:var(--bg3);border:1px solid var(--b);}
.bs-asset{font-family:var(--mono);font-size:9px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bs-bar-wrap{width:46px;height:5px;background:var(--b);border-radius:2px;overflow:hidden;}
.bs-bar{height:100%;border-radius:2px;transition:width .5s;}
.bs-pct{font-family:var(--mono);font-size:8px;width:32px;text-align:right;}
.bs-badge{font-family:var(--mono);font-size:7px;padding:1px 4px;border-radius:2px;}
.badge-best{background:var(--grn);color:#000;}
.badge-rdy{background:var(--b2);color:var(--t2);}
.badge-no{background:var(--rdim);color:var(--red2);}
.badge-lock{background:var(--adim);color:var(--amb2);}

.side{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);}
.threat-panel{padding:6px 8px;border-bottom:1px solid var(--b);flex-shrink:0;max-height:240px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.sec-ttl{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--t3);margin-bottom:4px;}
.thr-row{display:grid;grid-template-columns:52px 1fr 55px;gap:2px;align-items:center;padding:2px 4px;background:var(--bg3);border:1px solid var(--b);margin-bottom:2px;}
.thr-id{font-family:var(--mono);font-size:8px;}
.thr-st{font-size:8px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.thr-lk{font-family:var(--mono);font-size:7px;text-align:right;}
.ln{color:var(--t3);}.lh{color:var(--amb2);}.ll{color:var(--grn2);}.lf{color:var(--red2);}.le{color:var(--cyn2);}.ld{color:var(--pur2);}

.dual{display:grid;grid-template-columns:1fr 1fr;flex:1;min-height:0;overflow:hidden;border-bottom:1px solid var(--b);}
.lane{display:flex;flex-direction:column;overflow:hidden;}
.lane:first-child{border-right:1px solid var(--b);}
.lane-hdr{padding:4px 6px;border-bottom:1px solid var(--b);font-family:var(--mono);font-size:7px;letter-spacing:1px;color:var(--t2);flex-shrink:0;display:flex;align-items:center;gap:3px;}
.ld0{width:4px;height:4px;border-radius:50%;}
.ld-u{background:var(--blu2);box-shadow:0 0 4px var(--blu);}
.ld-d{background:var(--grn2);box-shadow:0 0 4px var(--grn);}
.lane-body{flex:1;overflow-y:auto;padding:3px;scrollbar-width:thin;scrollbar-color:var(--b2) transparent;}
.di{padding:3px 5px;margin-bottom:2px;border-left:2px solid var(--b2);opacity:.2;transition:all .35s;}
.di.on{opacity:1;border-left-color:var(--blu);background:var(--bdim);}
.di.on.dn{border-left-color:var(--grn);background:var(--gdim);}
.di.on.fl{border-left-color:var(--red);background:var(--rdim);}
.di.on.at{border-left-color:var(--cyn);background:rgba(24,168,192,.1);}
.di.on.warn{border-left-color:var(--orn);background:var(--adim);}
.di-t{font-family:var(--mono);font-size:7px;color:var(--t3);margin-bottom:1px;}
.di-who{font-size:7px;font-weight:700;color:var(--blu2);margin-bottom:1px;}
.di.dn .di-who{color:var(--grn2);}
.di.fl .di-who{color:var(--red2);}
.di.at .di-who{color:var(--cyn2);}
.di.warn .di-who{color:var(--orn2);}
.di-txt{font-size:9px;color:var(--t2);line-height:1.3;}
.di-res{margin-top:2px;font-family:var(--mono);font-size:7px;}
.ok{color:var(--grn2);}.no{color:var(--red2);}.au{color:var(--cyn2);}.wa{color:var(--orn2);}

.tl-area{grid-column:1/-1;padding:6px 12px;background:var(--bg2);border-top:1px solid var(--b);flex-shrink:0;}
.tl-ctrl{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.cbtn{background:transparent;border:1px solid var(--b2);color:var(--t2);font-family:var(--mono);font-size:13px;width:28px;height:26px;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;}
.cbtn:hover{background:var(--b2);}
.cbtn.pl{border-color:var(--grn2);color:var(--grn2);}
.sbtn{background:transparent;border:1px solid var(--b);color:var(--t3);font-family:var(--mono);font-size:8px;padding:1px 5px;cursor:pointer;transition:.2s;}
.sbtn.act{border-color:var(--amb2);color:var(--amb2);}
.tl-track{position:relative;height:34px;cursor:pointer;}
.tl-bar{position:absolute;top:13px;left:0;right:0;height:2px;background:var(--b2);}
.tl-prog{position:absolute;top:0;left:0;height:100%;background:var(--blu);transition:width .08s linear;}
.tl-cur{position:absolute;top:-6px;width:12px;height:12px;background:var(--amb2);border-radius:50%;transform:translateX(-50%);cursor:pointer;box-shadow:0 0 7px var(--amb);transition:left .08s linear;z-index:5;}
.tl-ev{position:absolute;top:0;transform:translateX(-50%);cursor:pointer;z-index:4;}
.tl-ev-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid;background:var(--bg2);margin:0 auto;}
.tl-ev-lbl{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:6px;white-space:nowrap;}
.ev-up .tl-ev-dot{border-color:var(--blu2);}.ev-up .tl-ev-lbl{color:var(--blu2);}
.ev-dn .tl-ev-dot{border-color:var(--grn2);}.ev-dn .tl-ev-lbl{color:var(--grn2);}
.ev-fl .tl-ev-dot{border-color:var(--red2);}.ev-fl .tl-ev-lbl{color:var(--red2);}
.ev-at .tl-ev-dot{border-color:var(--cyn2);}.ev-at .tl-ev-lbl{color:var(--cyn2);}
.ev-warn .tl-ev-dot{border-color:var(--orn2);}.ev-warn .tl-ev-lbl{color:var(--orn2);}
.tl-ev.hit .tl-ev-dot{background:currentColor;}

.leaflet-container{background:#040c14!important;}
.leaflet-tile{filter:brightness(.28) saturate(.3) hue-rotate(200deg);}
.leaflet-control-zoom{display:none;}
.leaflet-control-attribution{display:none;}
</style>
</head>
<body>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="sdot" id="sdot"></div>
    <div class="hdr-title">KJADS SIM v5 // <em>복합위협 다축 침투 대응</em> // 서부·중부·동부 3축</div>
  </div>
  <div class="mode-wrap">
    <button class="mbtn ar" id="bR" onclick="setMode('real')">현실 (실패)</button>
    <button class="mbtn" id="bK" onclick="setMode('kjads')">KJADS 적용</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="t-disp" id="tDisp">T+00:00</div>
  </div>
</div>

<div class="main">
  <div class="map-wrap" id="mapWrap">
    <div id="map"></div>
    <div class="alert" id="alertBox"></div>
    <div class="popup" id="popup">
      <div class="pop-lbl" id="popLbl"></div>
      <div class="pop-ttl" id="popTtl"></div>
      <div class="pop-body" id="popBody"></div>
      <div class="pop-foot" id="popFoot"></div>
    </div>
    <div class="zone-panel" id="zonePanel">
      <div class="zp-title">▸ 구역별 가용자산 / 교전 상태</div>
      <div id="zoneRows"></div>
    </div>
    <div class="bs-panel" id="bsPanel">
      <div class="bs-title">▸ BEST SHOOTER 분석</div>
      <div id="bsRows"></div>
    </div>
  </div>

  <div class="side">
    <div class="threat-panel">
      <div class="sec-ttl">▸ 위협별 교전 상태</div>
      <div id="thrRows"></div>
    </div>
    <div class="dual">
      <div class="lane">
        <div class="lane-hdr"><div class="ld0 ld-u"></div>상위제대 결심</div>
        <div class="lane-body" id="upLane"></div>
      </div>
      <div class="lane">
        <div class="lane-hdr"><div class="ld0 ld-d"></div>하위제대 실행</div>
        <div class="lane-body" id="dnLane"></div>
      </div>
    </div>
  </div>

  <div class="tl-area">
    <div class="tl-ctrl">
      <button class="cbtn" id="btnPlay" onclick="togglePlay()">▶</button>
      <button class="cbtn" style="font-size:11px;" onclick="doReset()">↺</button>
      <button class="sbtn act" id="s1" onclick="setSpd(1)">1×</button>
      <button class="sbtn" id="s2" onclick="setSpd(2)">2×</button>
      <button class="sbtn" id="s4" onclick="setSpd(4)">4×</button>
      <button class="sbtn" id="s8" onclick="setSpd(8)">8×</button>
      <span style="font-family:var(--mono);font-size:7px;color:var(--t3);margin-left:4px;">타임라인 클릭 이동 가능</span>
    </div>
    <div class="tl-track" id="tlTrack">
      <div class="tl-bar"><div class="tl-prog" id="tlProg"></div></div>
      <div class="tl-cur" id="tlCur"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// 전역 상태
// ═══════════════════════════════════════════════════════
const TOTAL = 90;
let mode = 'real', cur = 0, prevCur = 0, playing = false, spd = 1;
let raf = null, lastTs = null, popTimer = null, lastPopT = -99;
let triggered = {};

// Leaflet — 줌 아웃, 동해 포함 센터
const map = L.map('map',{center:[37.8,127.8],zoom:8,zoomControl:false,attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:13,minZoom:6}).addTo(map);
setTimeout(()=>map.invalidateSize(),100);

const layerZone    = L.layerGroup().addTo(map);
const layerAsset   = L.layerGroup().addTo(map);
const layerThreat  = L.layerGroup().addTo(map);
const layerMissile = L.layerGroup().addTo(map);
const layerFx      = L.layerGroup().addTo(map);
const layerFighter = L.layerGroup().addTo(map);
const layerLock    = L.layerGroup().addTo(map);

// ═══════════════════════════════════════════════════════
// 구역 — 세로 3분할 (MDL 선 제거)
// ═══════════════════════════════════════════════════════
const ZONES=[
  {id:'W',short:'서 부',col:'#2870c8',
   poly:[[38.8,123.0],[38.8,126.7],[35.8,126.7],[35.8,123.0]]},
  {id:'M',short:'중 부',col:'#f8b030',
   poly:[[38.8,126.7],[38.8,128.3],[35.8,128.3],[35.8,126.7]]},
  {id:'E',short:'동 부',col:'#18b050',
   poly:[[38.8,128.3],[38.8,131.0],[35.8,131.0],[35.8,128.3]]},
];

// ═══════════════════════════════════════════════════════
// 방공 자산
// ═══════════════════════════════════════════════════════
const ASSETS=[
  // ── 서부 ──
  {id:'이지스-서해',type:'aegis',la:37.40,lo:124.60,col:'#9060d8',r_km:400,lbl:'이지스-서해',cap:['BMT','CM','MiG'],zone:'W'},
  {id:'천궁-김포',type:'pac',la:37.65,lo:126.55,col:'#2060b8',r_km:40,lbl:'천궁-김포(40)',cap:['CM','MiG'],zone:'W'},
  {id:'드론킬러-파주',type:'dkill',la:37.82,lo:126.78,col:'#10c858',r_km:3,lbl:'DK-파주(3)',cap:['UAV'],zone:'W'},
  {id:'천마-1군단',type:'drone',la:37.92,lo:126.85,col:'#18a840',r_km:10,lbl:'천마-1군단(10)',cap:['UAV'],zone:'W'},
  {id:'기지-수원',type:'base',la:37.24,lo:127.00,col:'#f8b030',lbl:'수원기지',zone:'W'},

  // ── 중부 ──
  {id:'L-SAM',type:'pac',la:37.50,lo:127.55,col:'#50a0f8',r_km:120,lbl:'L-SAM(120)',cap:['BMT','MiG'],zone:'M'},
  {id:'PAC-오산',type:'pac',la:37.08,lo:127.03,col:'#3080d8',r_km:70,lbl:'PAC-오산(70)',cap:['BMT','CM','MiG'],zone:'M'},
  {id:'천궁-성남',type:'pac',la:37.45,lo:127.15,col:'#2060b8',r_km:40,lbl:'천궁-성남(40)',cap:['CM','MiG'],zone:'M'},
  {id:'천궁-춘천',type:'pac',la:37.88,lo:127.73,col:'#2060b8',r_km:40,lbl:'천궁-춘천(40)',cap:['CM','MiG'],zone:'M'},
  {id:'수방-방공',type:'dkill',la:37.57,lo:126.97,col:'#10c858',r_km:3,lbl:'수방방공(3)',cap:['UAV'],zone:'M'},
  {id:'천마-수도군단',type:'drone',la:37.62,lo:127.15,col:'#18a840',r_km:10,lbl:'천마-수도(10)',cap:['UAV'],zone:'M'},
  {id:'천마-3군단',type:'drone',la:37.85,lo:127.55,col:'#18a840',r_km:10,lbl:'천마-3군단(10)',cap:['UAV'],zone:'M'},
  {id:'기지-오산',type:'base',la:37.08,lo:127.03,col:'#f8b030',lbl:'오산기지',zone:'M'},
  {id:'기지-청주',type:'base',la:36.72,lo:127.50,col:'#f8b030',lbl:'청주기지',zone:'M'},

  // ── 동부 ──
  {id:'이지스-동해',type:'aegis',la:37.80,lo:129.80,col:'#9060d8',r_km:400,lbl:'이지스-동해',cap:['BMT','CM','MiG'],zone:'E'},

function distKm(la1,lo1,la2,lo2){
  const dlat=(la2-la1)*111;
  const dlon=(lo2-lo1)*111*Math.cos(la1*Math.PI/180);
  return Math.sqrt(dlat*dlat+dlon*dlon);
}

// 경로 보간
function lerp(a,b,t){return a+(b-a)*t;}
function catmull(p0,p1,p2,p3,t){
  const t2=t*t,t3=t2*t;
  return{la:.5*((2*p1.la)+(-p0.la+p2.la)*t+(2*p0.la-5*p1.la+4*p2.la-p3.la)*t2+(-p0.la+3*p1.la-3*p2.la+p3.la)*t3),
         lo:.5*((2*p1.lo)+(-p0.lo+p2.lo)*t+(2*p0.lo-5*p1.lo+4*p2.lo-p3.lo)*t2+(-p0.lo+3*p1.lo-3*p2.lo+p3.lo)*t3)};
}
function getPt(th,t){
  if(th.destroyed&&th.destroyedAt) return th.destroyedAt;
  const pts=th.pts;
  if(!pts||pts.length===0) return{la:0,lo:0};
  if(t<=pts[0].t) return{la:pts[0].la,lo:pts[0].lo};
  if(t>=pts[pts.length-1].t) return{la:pts[pts.length-1].la,lo:pts[pts.length-1].lo};
  for(let i=0;i<pts.length-1;i++){
    if(t>=pts[i].t&&t<pts[i+1].t){
      const f=(t-pts[i].t)/(pts[i+1].t-pts[i].t);
      const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
      return catmull(p0,p1,p2,p3,f);
    }
  }
  return{la:pts[pts.length-1].la,lo:pts[pts.length-1].lo};
}

const effects=[];

function addTrackingMissile(fromLa,fromLo,threatId,speed,col,onHit){
  const th=threats.find(t=>t.id===threatId);
  if(!th||th.destroyed) return;
  effects.push({
    type:'track',la:fromLa,lo:fromLo,prevLa:fromLa,prevLo:fromLo,
    threatId:threatId,speed:speed,col:col,onHit:onHit,
    elapsed:0,maxTime:10
  });
}
function addExplosion(la,lo,col,big){
  effects.push({type:'exp',la,lo,col,prog:0,big:big||false});
}

const fighters=[];

function launchFighter(id,baseId,targetThreatId,launchT,label,col){
  const base=ASSETS.find(a=>a.id===baseId);
  if(!base) return;
  if(fighters.find(f=>f.id===id)) return;
  fighters.push({
    id:id,baseId:baseId,baseLa:base.la,baseLo:base.lo,
    targetId:targetThreatId,state:'launching',
    la:base.la,lo:base.lo,col:col||'#50a0f8',label:label||'F-15K',
    launchT:launchT,missileFired:false,killT:null,
    returnStartT:null
  });
}

function updateFighters(dt){
  fighters.forEach(f=>{
    if(cur<f.launchT){f.state='launching';f.la=f.baseLa;f.lo=f.baseLo;return;}
    if(f.state==='landed') return;

    const th=threats.find(t=>t.id===f.targetId);
    const moveKm=SPD.F15*dt;

    if(f.state==='launching'||f.state==='engaging'){
      if(th && !th.destroyed){
        const tpos=getPt(th,cur);
        const dist=distKm(f.la,f.lo,tpos.la,tpos.lo);
        if(dist<=18 && !f.missileFired){
          f.missileFired=true;
          f.state='engaging';
          addTrackingMissile(f.la,f.lo,f.targetId,SPD.fighter_miss,f.col,()=>{
            f.killT=cur;
            f.state='returning';
            f.returnStartT=cur;
          });
        }
        if(dist>1.5){
          const mv=Math.min(moveKm,dist);
          const ratio=mv/dist;
          f.la += (tpos.la-f.la)*ratio;
          f.lo += (tpos.lo-f.lo)*ratio;
        }
      }else{
        // 표적이 다른 수단으로 격추되었으면 복귀
        f.state='returning';
        f.returnStartT=cur;
      }
    }

    if(f.state==='returning'){
      const dist=distKm(f.la,f.lo,f.baseLa,f.baseLo);
      if(dist<=1){
        f.state='landed';
        if(occupiedAssets.has(f.baseId)) occupiedAssets.delete(f.baseId);
        return;
      }
      const mv=Math.min(moveKm,dist);
      const ratio=mv/dist;
      f.la += (f.baseLa-f.la)*ratio;
      f.lo += (f.baseLo-f.lo)*ratio;
    }
  });
}

const lockMap={};
const occupiedAssets=new Set();
const expendedAssets=new Set();
const conflictAssets=new Set();
const firingAssets=new Set();

function markFiring(assetId){
  firingAssets.add(assetId);
  setTimeout(()=>firingAssets.delete(assetId),1800);
}

function engage(assetId,threatId,onKill){
  const a=ASSETS.find(x=>x.id===assetId);
  const th=threats.find(t=>t.id===threatId);
  if(!a||!th||th.destroyed) return;
  lockMap[threatId]=assetId;
  occupiedAssets.add(assetId);
  markFiring(assetId);

  let speed=SPD.sam_miss;
  if(a.type==='aegis') speed=SPD.aegis_miss;
  else if(a.id==='L-SAM') speed=SPD.sam_miss;
  else if(a.type==='pac') speed=SPD.pac_miss;
  else if(a.type==='drone') speed=SPD.sam_miss;
  else if(a.type==='dkill') speed=SPD.drone_miss;

  addTrackingMissile(a.la,a.lo,threatId,speed,a.col,()=>{
    TS[threatId]={st:`${a.id} 격추`,lk:'d'};
    delete lockMap[threatId];
    occupiedAssets.delete(assetId);
    if(onKill) onKill();
  });
}

function calcBestShooter(thrId){
  const th=threats.find(t=>t.id===thrId);
  if(!th||th.destroyed||cur<th.startT) return [];
  const pos=getPt(th,cur);
  const results=[];
  ASSETS.forEach(a=>{
    if(a.type==='base') return;
    if(!a.cap||!a.cap.includes(th.type)) return;
    const dist=distKm(a.la,a.lo,pos.la,pos.lo);
    const inR=dist<=a.r_km;
    const locked=occupiedAssets.has(a.id)&&lockMap[thrId]!==a.id;
    let score=0;
    if(inR&&!locked){
      score=Math.round((1-dist/a.r_km)*100);
      if(th.type==='BMT'&&(a.id==='L-SAM'||a.id.startsWith('PAC'))) score+=15;
      if(th.type==='UAV'&&a.type==='dkill') score+=20;
      if(th.type==='CM'&&a.type==='aegis') score+=15;
      if(a.zone===th.axis) score+=10;
    }
    results.push({assetId:a.id,dist:Math.round(dist),inRange:inR,locked,score,zone:a.zone});
  });
  results.sort((a,b)=>b.score-a.score);
  return results;
}

function updateDynamic(dt){
  // 위협
  layerThreat.clearLayers();
  threats.forEach(th=>{
    if(cur<th.startT) return;
    if(th.destroyed) return;
    const pos=getPt(th,cur);

    const tpts=[];
    for(let d=0;d<=6;d+=.4){
      const tt=Math.max(th.startT,cur-6+d);
      if(tt<=cur){const tp=getPt(th,tt);tpts.push([tp.la,tp.lo]);}
    }
    if(tpts.length>1) L.polyline(tpts,{color:th.col,weight:1.3,opacity:.4,dashArray:'3,3'}).addTo(layerThreat);

    const blink=Math.floor(Date.now()/500)%2;
    let sz=blink?8:6;
    let shape='circle';
    if(th.type==='MiG') shape='tri';
    if(th.type==='BMT') sz=blink?10:7;
    if(th.type==='CM')  shape='sq';

    let svg='';
    if(shape==='circle'){
      svg=`<circle cx="8" cy="8" r="${sz/2+1}" fill="${th.col}" opacity=".9"/>`;
      if(blink) svg+=`<circle cx="8" cy="8" r="${sz+2}" fill="${th.col}" opacity=".2"/>`;
    }else if(shape==='tri'){
      const s=sz;
      svg=`<polygon points="8,${8-s} ${8+s},${8+s} ${8-s},${8+s}" fill="${th.col}" opacity=".9"/>`;
    }else{
      const s=sz/2;
      svg=`<rect x="${8-s}" y="${8-s}" width="${sz}" height="${sz}" fill="${th.col}" opacity=".9"/>`;
    }

    L.marker([pos.la,pos.lo],{icon:L.divIcon({className:'',
      html:`<div><svg width="16" height="16" viewBox="0 0 16 16">${svg}</svg>
            <div style="position:absolute;top:-2px;left:18px;font-family:monospace;font-size:8px;color:${th.col};white-space:nowrap;text-shadow:0 0 3px #000;">${th.id}</div></div>`,
      iconAnchor:[8,8],zIndexOffset:500})}).addTo(layerThreat);
  });

  // Lock 라인
  layerLock.clearLayers();
  if(mode==='kjads'){
    Object.entries(lockMap).forEach(([tid,aid])=>{
      const th=threats.find(t=>t.id===tid);
      const asset=ASSETS.find(a=>a.id===aid);
      if(!th||!asset||th.destroyed||cur<th.startT) return;
      const pos=getPt(th,cur);
      L.polyline([[pos.la,pos.lo],[asset.la,asset.lo]],{
        color:asset.col,weight:1,opacity:.6,dashArray:'4,3'}).addTo(layerLock);
      const mla=(pos.la+asset.la)/2, mlo=(pos.lo+asset.lo)/2;
      L.marker([mla,mlo],{icon:L.divIcon({className:'',
        html:`<div style="font-family:monospace;font-size:7px;color:${asset.col};background:rgba(4,12,20,.8);padding:0 2px;">LOCK</div>`,
        iconAnchor:[15,6]})}).addTo(layerLock);
    });
  }

  // 미사일 + 폭발
  layerMissile.clearLayers();
  layerFx.clearLayers();

  for(let i=effects.length-1;i>=0;i--){
    const e=effects[i];

    if(e.type==='track'){
      const th=threats.find(t=>t.id===e.threatId);
      if(!th||th.destroyed){
        addExplosion(e.la,e.lo,e.col,false);
        effects.splice(i,1);
        continue;
      }
      const tpos=getPt(th,cur);
      const d=distKm(e.la,e.lo,tpos.la,tpos.lo);
      const moveKm=e.speed*dt;

      if(d<=moveKm||d<1.5){
        e.la=tpos.la;e.lo=tpos.lo;
        addExplosion(tpos.la,tpos.lo,e.col,true);
        th.destroyed=true;
        th.destroyedAt={la:tpos.la,lo:tpos.lo};
        if(e.onHit) e.onHit();
        effects.splice(i,1);
      }else{
        e.prevLa=e.la;e.prevLo=e.lo;
        const ratio=moveKm/d;
        e.la += (tpos.la-e.la)*ratio;
        e.lo += (tpos.lo-e.lo)*ratio;
        e.elapsed+=dt;
        L.circleMarker([e.la,e.lo],{radius:3,color:e.col,fillColor:e.col,fillOpacity:1,weight:0}).addTo(layerMissile);
        L.polyline([[e.prevLa,e.prevLo],[e.la,e.lo]],{color:e.col,weight:1.6,opacity:.75}).addTo(layerMissile);
        if(e.elapsed>e.maxTime){
          addExplosion(e.la,e.lo,'#f8b030',false);
          effects.splice(i,1);
        }
      }

    }else if(e.type==='exp'){
      e.prog=Math.min(1,e.prog+.028);
      const r=e.prog*(e.big?22:14);
      const op=1-e.prog;
      L.circleMarker([e.la,e.lo],{radius:r,color:e.col,fillColor:e.col,fillOpacity:op*.3,weight:1.5,opacity:op}).addTo(layerFx);
      L.circleMarker([e.la,e.lo],{radius:r*.35,color:'#ffffff',fillColor:'#ffffff',fillOpacity:op*.5,weight:0}).addTo(layerFx);
      if(e.prog>=1) effects.splice(i,1);
    }
  }

  // 전투기
  updateFighters(dt);
  layerFighter.clearLayers();
  fighters.forEach(f=>{
    if(cur<f.launchT||f.state==='landed') return;
    let stLbl='';
    if(f.state==='launching') stLbl='출격';
    else if(f.state==='engaging') stLbl='교전';
    else if(f.state==='returning') stLbl='↩귀환';

    L.marker([f.la,f.lo],{icon:L.divIcon({className:'',html:`
      <svg width="14" height="14" viewBox="0 0 14 14">
        <path d="M7,1L10.5,5L14,6L10.5,7.5L11.5,13L7,10L2.5,13L3.5,7.5L0,6L3.5,5Z" fill="${f.col}" opacity=".9"/>
      </svg><div style="font-family:monospace;font-size:7px;color:${f.col};white-space:nowrap;position:absolute;top:0;left:16px;text-shadow:0 0 3px #000;">${f.label} ${stLbl}</div>`,
      iconAnchor:[7,7]})}).addTo(layerFighter);

    L.polyline([[f.baseLa,f.baseLo],[f.la,f.lo]],{color:f.col,weight:1,opacity:.2,dashArray:'2,3'}).addTo(layerFighter);
  });

  // 현실 모드 KA-1
  if(mode==='real'&&cur>=3&&cur<=25){
    const uav=threats.find(t=>t.id==='UAV-W1');
    if(uav){
      const prog=Math.min(1,(cur-3)/15);
      const uavpos=getPt(uav,cur);
      const la=lerp(37.25,uavpos.la+0.08,prog);
      const lo=lerp(127.0,uavpos.lo-0.18,prog);
      if(cur<20){
        L.marker([la,lo],{icon:L.divIcon({className:'',html:`
          <svg width="14" height="14" viewBox="0 0 14 14">
            <path d="M7,1L10.5,5L14,6L10.5,7.5L11.5,13L7,10L2.5,13L3.5,7.5L0,6L3.5,5Z" fill="#e08020" opacity=".9"/>
          </svg><div style="font-family:monospace;font-size:7px;color:#e08020;position:absolute;top:0;left:16px;">KA-1</div>`,
          iconAnchor:[7,7]})}).addTo(layerFighter);
      }else{
        L.marker([37.72,126.82],{icon:L.divIcon({className:'',html:`
          <div style="font-size:12px;color:#ff4020;">✕</div>
          <div style="font-family:monospace;font-size:7px;color:#ff4020;white-space:nowrap;">KA-1 추락</div>`,
          iconAnchor:[8,8]})}).addTo(layerFighter);
      }
    }
  }
}

// 구역별 자산 패널
// ═══════════════════════════════════════════════════════
function updateZonePanel(){
  const activeThr=threats.filter(t=>!t.destroyed&&cur>=t.startT);

  const bestAssets=new Set();
  if(mode==='kjads'){
    activeThr.forEach(t=>{
      const bs=calcBestShooter(t.id);
      if(bs.length>0 && bs[0].score>0 && !bs[0].locked) bestAssets.add(bs[0].assetId);
    });
  }

  let html='';
  const zoneMap={W:'서부',M:'중부',E:'동부'};
  const zoneCls={W:'west',M:'mid',E:'east'};

  ['W','M','E'].forEach(zId=>{
    const zSet=ASSETS.filter(a=>a.zone===zId);
    const zAssets=zSet.filter(a=>a.type!=='base');
    const zBases=zSet.filter(a=>a.type==='base');
    const engagedCount=zSet.filter(a=>occupiedAssets.has(a.id)).length;
    const threatInZone=activeThr.filter(t=>t.axis===zId).length;
    const zc=ZONES.find(z=>z.id===zId).col;

    html+=`<div class="zp-zone ${zoneCls[zId]}">
      <div class="zp-zhdr">
        <span class="zp-zname" style="color:${zc}">${zoneMap[zId]}구역</span>
        <span class="zp-zstat">위협 ${threatInZone} · 교전자산 ${engagedCount}</span>
      </div>
      <div class="zp-assets">`;

    zAssets.forEach(a=>{
      let cls='ready';
      if(mode==='kjads'){
        if(conflictAssets.has(a.id)) cls='conflict';
        else if(firingAssets.has(a.id)) cls='firing';
        else if(occupiedAssets.has(a.id)) cls='engaged';
        else if(bestAssets.has(a.id)) cls='best';
        else if(expendedAssets.has(a.id)) cls='expended';
      }
      const style=cls==='ready'?`color:${a.col};`:'';
      html+=`<span class="zp-asset ${cls}" style="${style}">${a.lbl||a.id}</span>`;
    });
    zBases.forEach(b=>{
      let cls='ready';
      let suffix='';
      if(mode==='kjads'){
        const launchingF=fighters.filter(f=>f.baseId===b.id && (f.state==='launching'||f.state==='engaging'));
        const returningF=fighters.filter(f=>f.baseId===b.id && f.state==='returning');
        if(launchingF.length>0){cls='firing';suffix=' ✈';}
        else if(returningF.length>0){cls='engaged';suffix=' ↩';}
      }
      const style=cls==='ready'?`color:${b.col};`:'';
      html+=`<span class="zp-asset ${cls}" style="${style}">${b.lbl}${suffix}</span>`;
    });

    html+=`</div></div>`;
  });
  document.getElementById('zoneRows').innerHTML=html;
}

function updateBSPanel(){
  const activeThr=threats.filter(t=>!t.destroyed&&cur>=t.startT);
  if(activeThr.length===0){
    document.getElementById('bsRows').innerHTML='<div style="font-family:monospace;font-size:8px;color:var(--t3);">위협 없음</div>';
    return;
  }
  const main=activeThr[0];
  const bsData=calcBestShooter(main.id);
  const rows=bsData.slice(0,5).map(r=>{
    const a=ASSETS.find(x=>x.id===r.assetId);
    if(!a) return '';
    let badge='',barCol='#384060';
    if(r.score>0&&!r.locked){
      if(r.assetId===bsData[0].assetId&&r.score===bsData[0].score){
        badge='<span class="bs-badge badge-best">BEST</span>';barCol=a.col;
      }else{
        badge='<span class="bs-badge badge-rdy">대기</span>';barCol=a.col+'80';
      }
    }else if(r.locked){
      badge='<span class="bs-badge badge-lock">교전中</span>';
    }else{
      badge='<span class="bs-badge badge-no">사거리外</span>';
    }
    const w=r.score>0?Math.min(100,r.score):0;
    return `<div class="bs-row">
      <span class="bs-asset" style="color:${a.col};">${r.assetId}</span>
      <div class="bs-bar-wrap"><div class="bs-bar" style="width:${w}%;background:${barCol};"></div></div>
      <span class="bs-pct" style="color:${a.col};">${r.dist}km</span>
      ${badge}
    </div>`;
  }).join('');

  document.getElementById('bsRows').innerHTML=
    `<div style="font-family:monospace;font-size:8px;color:${main.col};margin-bottom:3px;">📡 ${main.id} (${main.axis}축) 분석</div>${rows}`;
}

function updateThreatPanel(){
  const lkM={n:'ln',h:'lh',l:'ll',f:'lf',e:'le',d:'ld'};
  const lkT={n:'—',h:'HOLD',l:'LOCK',f:'실패',e:'교전',d:'격추'};
  document.getElementById('thrRows').innerHTML=
    threats.map(th=>{
      const st=TS[th.id]||{st:'대기',lk:'n'};
      const col=th.type==='MiG'?'#e83030':th.type==='UAV'?'#e07020':th.type==='BMT'?'#f030f0':'#f0a030';
      return `<div class="thr-row">
        <span class="thr-id" style="color:${col};">${th.id}</span>
        <span class="thr-st">${st.st}</span>
        <span class="thr-lk ${lkM[st.lk]}">${lkT[st.lk]}</span>
      </div>`;
    }).join('');
}

function showAlert(msg,ok,type){
  const el=document.getElementById('alertBox');
  el.textContent=msg;
  el.className='alert show'+(ok===true?' ok':type==='info'?' info':type==='warn'?' warn':'');
  setTimeout(()=>el.className='alert',3500);
}

// ═══════════════════════════════════════════════════════
// 결심 레인
// ═══════════════════════════════════════════════════════
function buildLanes(){
  const evs=mode==='real'?EV_REAL:EV_KJADS;
  let uH='',uD='';
  evs.forEach((e,i)=>{
    const cls=e.cls||'';
    const h=`<div class="di ${cls}" id="di${i}">
      <div class="di-t">T+${String(e.t).padStart(2,'0')}분</div>
      <div class="di-who">${e.who}</div>
      <div class="di-txt">${e.ttl}</div>
      ${e.res?`<div class="di-res ${e.res}">${e.rt}</div>`:''}
    </div>`;
    const lane=e.lane==='dn'||e.lane==='warn'?'dn':'up';
    if(lane==='up') uH+=h; else uD+=h;
  });
  document.getElementById('upLane').innerHTML=uH;
  document.getElementById('dnLane').innerHTML=uD;
}

function updateLanes(){
  const evs=mode==='real'?EV_REAL:EV_KJADS;
  evs.forEach((e,i)=>{
    const el=document.getElementById('di'+i);
    if(!el) return;
    const lane=e.lane==='dn'||e.lane==='warn'?'dn':'up';
    let nc=`di ${e.cls||''}`;
    if(cur>=e.t){
      nc=`di on ${e.cls||''}`;
      if(lane==='dn') nc+=' dn';
    }
    if(nc!==el.className){
      el.className=nc;
      if(cur>=e.t&&Math.abs(cur-e.t)<.5) el.scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  });
}

function checkPopup(){
  const evs=mode==='real'?EV_REAL:EV_KJADS;
  evs.forEach(e=>{
    if(!e.popup) return;
    if(cur>=e.t&&cur<e.t+.5&&Math.abs(lastPopT-e.t)>.4){
      lastPopT=e.t;
      const p=document.getElementById('popup');
      p.className='popup show '+(e.pcls||'');
      const lblMap={up:'▲ 상위제대 결심',dn:'▼ 하위제대 실행',fl:'✗ 실패',at:'⚡ 자동 처리',warn:'⚠ 자위권 충돌'};
      document.getElementById('popLbl').textContent=lblMap[e.pcls]||'';
      document.getElementById('popTtl').textContent=e.pt||e.ttl;
      document.getElementById('popBody').innerHTML=(e.pb||e.body).replace(/\n/g,'<br>');
      document.getElementById('popFoot').textContent=`T+${e.t}분`;
      if(e.alrt) showAlert(e.alrt,e.aok,e.pcls==='warn'?'warn':e.pcls==='at'?'info':undefined);
      clearTimeout(popTimer);
      popTimer=setTimeout(()=>p.className='popup',3000);
    }
  });
}
// ═══════════════════════════════════════════════════════
// 타임라인
// ═══════════════════════════════════════════════════════
function buildTL(){
  const track=document.getElementById('tlTrack');
  track.querySelectorAll('.tl-ev').forEach(e=>e.remove());
  const evs=mode==='real'?EV_REAL:EV_KJADS;
  evs.forEach((e,i)=>{
    if(!e.popup) return;
    const d=document.createElement('div');
    d.className=`tl-ev ev-${e.cls==='warn'?'warn':e.cls||'up'}`;
    d.style.left=(e.t/TOTAL*100)+'%';
    d.id='tev'+i;
    d.innerHTML=`<div class="tl-ev-dot"></div><div class="tl-ev-lbl">T+${e.t}</div>`;
    d.onclick=()=>seekTo(e.t);
    track.appendChild(d);
  });
}

function updateTL(){
  const pct=cur/TOTAL*100;
  document.getElementById('tlProg').style.width=pct+'%';
  document.getElementById('tlCur').style.left=pct+'%';
  const evs=mode==='real'?EV_REAL:EV_KJADS;
  evs.forEach((e,i)=>{
    const el=document.getElementById('tev'+i);
    if(el) el.classList.toggle('hit',cur>=e.t);
  });
  const m=Math.floor(cur);
  document.getElementById('tDisp').textContent=
    `T+${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
}

document.getElementById('tlTrack').addEventListener('click',function(e){
  const r=this.getBoundingClientRect();
  seekTo((e.clientX-r.left)/r.width*TOTAL);
});

// ═══════════════════════════════════════════════════════
// 재생 루프
// ═══════════════════════════════════════════════════════
function tick(ts){
  if(!playing){lastTs=null;return;}
  if(!lastTs){lastTs=ts;}
  const dtSec=(ts-lastTs)/1000;
  const dtMin=dtSec*spd; // 시뮬 시간 진행 (분)
  prevCur=cur;
  cur+=dtMin;
  lastTs=ts;
  if(cur>=TOTAL){
    cur=TOTAL;playing=false;
    document.getElementById('btnPlay').textContent='▶';
    document.getElementById('btnPlay').className='cbtn';
    document.getElementById('sdot').className='sdot';
  }
  checkTriggers();
  updateDynamic(dtMin);
  updateZonePanel();
  updateBSPanel();
  updateThreatPanel();
  updateLanes();
  updateTL();
  checkPopup();
  if(playing) raf=requestAnimationFrame(tick);
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('btnPlay');
  if(playing){
    btn.textContent='⏸';btn.className='cbtn pl';
    lastTs=null;raf=requestAnimationFrame(tick);
    document.getElementById('sdot').className='sdot live';
  }else{
    btn.textContent='▶';btn.className='cbtn';
    cancelAnimationFrame(raf);
    document.getElementById('sdot').className='sdot';
  }
}

function seekTo(t){
  cur=Math.max(0,Math.min(TOTAL,t));
  prevCur=cur;
  lastPopT=-99;triggered={};
  resetThreats();initTS();
  Object.keys(lockMap).forEach(k=>delete lockMap[k]);
  occupiedAssets.clear();
  expendedAssets.clear();
  conflictAssets.clear();
  firingAssets.clear();
  effects.length=0;
  fighters.length=0;
  checkTriggers();
  updateDynamic(0.016);
  updateZonePanel();updateBSPanel();updateThreatPanel();updateLanes();updateTL();
}

function doReset(){
  playing=false;cur=0;lastTs=null;
  document.getElementById('btnPlay').textContent='▶';
  document.getElementById('btnPlay').className='cbtn';
  document.getElementById('popup').className='popup';
  document.getElementById('alertBox').className='alert';
  document.getElementById('sdot').className='sdot';
  seekTo(0);
}

function setSpd(s){
  spd=s;
  ['s1','s2','s4','s8'].forEach(id=>{
    document.getElementById(id).className='sbtn'+(id==='s'+s?' act':'');
  });
}

function setMode(m){
  mode=m;
  document.getElementById('bR').className='mbtn'+(m==='real'?' ar':'');
  document.getElementById('bK').className='mbtn'+(m==='kjads'?' ak':'');
  buildLanes();buildTL();doReset();
}

// 초기화
drawStatic();
buildLanes();buildTL();
seekTo(0);
window.addEventListener('resize',()=>map.invalidateSize());
</script>

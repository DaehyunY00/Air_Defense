<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASBS 시뮬레이션 — 현재 체계 vs 통합방공체계 비교</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
:root{
  --bg-primary:#0a0e1a; --bg-secondary:#111827; --bg-panel:#1a2332;
  --bg-card:#1e2a3a; --bg-card-hover:#243246;
  --border:#2a3a4a; --border-strong:#3a4a5a;
  --text-primary:#e0e6ed; --text-secondary:#8899aa; --text-muted:#556677;

  --c-kaoc:#FFEB3B;    /* KAOC/KAMDOC */
  --c-mcrc:#2196F3;    /* MCRC */
  --c-adc2a:#4CAF50;   /* ADC2A */
  --c-kntds:#5C6BC0;   /* KNTDS */
  --c-threat:#ef5350;
  --c-detect:#00BCD4;
  --c-intercept:#FF9800;

  /* As-Is/To-Be 색상 */
  --c-asis:#ff7043;    /* As-Is 강조 (문제점) */
  --c-tobe:#26c6da;    /* To-Be 강조 (개선) */

  --c-success:#66bb6a;
  --c-fail:#ef5350;
  --c-warn:#ffa726;
  --c-info:#42a5f5;

  /* 4분기 모드 */
  --c-mode-auto:#26d7e7;     /* 자동채택 */
  --c-mode-verify:#ffc857;   /* 인간검증 */
  --c-mode-delegate:#b58cff; /* 분권위임 */
  --c-mode-preauth:#ff6b9d;  /* 사전승인 */

  --c-voice:#ffd54f;
  --c-data:#42a5f5;
  --c-control:#ab47bc;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;
  background:var(--bg-primary); color:var(--text-primary);
  height:100vh; overflow:hidden; font-size:13px; line-height:1.5;
}
#app{display:flex; flex-direction:column; height:100vh}

/* 헤더 */
#header{
  background:linear-gradient(135deg,#0d1526,#162035);
  border-bottom:1px solid var(--border);
  padding:10px 20px; display:flex; align-items:center; gap:14px;
  min-height:54px; flex-shrink:0;
}
#header h1{ font-size:17px; font-weight:700; color:#fff; white-space:nowrap;}
#header h1 .lbl-asis{color:var(--c-asis)}
#header h1 .lbl-tobe{color:var(--c-tobe)}
#header .subtitle{
  font-size:11px; color:var(--text-muted);
  border-left:1px solid var(--border); padding-left:14px;
}
.disclaimer-pill{
  margin-left:auto; padding:5px 10px;
  background:rgba(239,83,80,0.1); border:1px solid rgba(239,83,80,0.3);
  border-radius:4px; font-size:10.5px; color:#ff9a96;
}

/* 탭 바 */
#tab-bar{
  display:flex; background:var(--bg-secondary);
  border-bottom:1px solid var(--border); flex-shrink:0;
  padding:0 10px;
}
.tab-btn{
  padding:11px 18px; background:transparent; border:none;
  color:var(--text-muted); cursor:pointer; font-size:13px; font-weight:500;
  border-bottom:3px solid transparent; transition:all 0.18s;
  font-family:inherit; letter-spacing:.2px;
}
.tab-btn:hover{ color:var(--text-secondary); background:rgba(255,255,255,0.02);}
.tab-btn.active{ color:#fff; border-bottom-color:var(--c-info); background:rgba(33,150,243,0.05);}
.tab-btn.tab-asis.active{ color:var(--c-asis); border-bottom-color:var(--c-asis); background:rgba(255,112,67,0.06);}
.tab-btn.tab-tobe.active{ color:var(--c-tobe); border-bottom-color:var(--c-tobe); background:rgba(38,198,218,0.06);}
.tab-btn .tab-tag{
  display:inline-block; margin-left:6px; padding:1px 6px;
  font-size:10px; border-radius:8px; vertical-align:middle;
}
.tab-asis .tab-tag{ background:rgba(255,112,67,0.15); color:var(--c-asis);}
.tab-tobe .tab-tag{ background:rgba(38,198,218,0.15); color:var(--c-tobe);}

/* 콘텐츠 영역 */
#content{ flex:1; overflow:auto; position:relative;}
.tab-pane{ display:none; padding:18px 22px;}
.tab-pane.active{ display:block;}

/* 공통: 카드/패널 */
.card{
  background:var(--bg-panel); border:1px solid var(--border);
  border-radius:6px; padding:14px; margin-bottom:14px;
}
.card h2{ font-size:14px; color:var(--c-info); margin-bottom:10px; font-weight:600;}
.card h3{ font-size:12.5px; color:var(--text-secondary); margin-bottom:8px; font-weight:600;}
.card p{ color:var(--text-secondary); margin-bottom:8px; line-height:1.65;}
.card ul{ margin-left:20px; color:var(--text-secondary); line-height:1.7;}
.card ul li{ margin-bottom:4px;}

/* 개요 탭 - 비교 그리드 */
.compare-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.compare-grid .card.asis{ border-left:3px solid var(--c-asis);}
.compare-grid .card.tobe{ border-left:3px solid var(--c-tobe);}
.compare-grid .card.asis h2{ color:var(--c-asis);}
.compare-grid .card.tobe h2{ color:var(--c-tobe);}

/* 시나리오 표 */
.scenario-table{ width:100%; border-collapse:collapse; margin:8px 0; font-size:12px;}
.scenario-table th, .scenario-table td{
  padding:7px 9px; border:1px solid var(--border); text-align:center;
}
.scenario-table th{ background:var(--bg-card); color:var(--c-info); font-weight:600;}
.scenario-table td.threat-name{ text-align:left;}
.scenario-table tr.total{ background:rgba(33,150,243,0.06); font-weight:600;}
.scenario-table tr.total td{ color:var(--c-info);}

/* 자산 탭 */
.asset-toolbar{
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  margin-bottom:14px; padding:10px; background:var(--bg-panel);
  border:1px solid var(--border); border-radius:5px;
}
.asset-toolbar label{ font-size:11.5px; color:var(--text-secondary);}
.asset-toolbar select, .asset-toolbar input{
  background:var(--bg-card); border:1px solid var(--border);
  color:var(--text-primary); padding:4px 8px; border-radius:3px;
  font-family:inherit; font-size:11.5px;
}
.asset-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:11px;}
.asset-card{
  background:var(--bg-panel); border:1px solid var(--border);
  border-left:3px solid var(--border-strong); border-radius:5px; padding:10px 12px;
  transition:all 0.15s;
}
.asset-card:hover{ background:var(--bg-card); border-left-color:var(--c-info);}
.asset-card.svc-공군{ border-left-color:#4FC3F7;}
.asset-card.svc-육군{ border-left-color:#66BB6A;}
.asset-card.svc-해군{ border-left-color:#5C6BC0;}
.asset-card.svc-주한미군{ border-left-color:#FF7043;}
.asset-card.svc-합동{ border-left-color:#FFEB3B;}
.asset-card .ac-name{ font-size:13.5px; font-weight:600; color:#fff; margin-bottom:3px;}
.asset-card .ac-meta{ font-size:10.5px; color:var(--text-muted); margin-bottom:6px;}
.asset-card .ac-row{ font-size:11px; color:var(--text-secondary); margin:2px 0;}
.asset-card .ac-row b{ color:var(--text-primary); display:inline-block; min-width:60px;}
.asset-card .ac-tags{ margin-top:6px; display:flex; flex-wrap:wrap; gap:4px;}
.tag{
  display:inline-block; padding:1.5px 6px; font-size:10px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  color:var(--text-secondary);
}
.tag.active{ background:rgba(102,187,106,0.12); border-color:rgba(102,187,106,0.35); color:#9ed8a3;}
.tag.planned{ background:rgba(255,167,38,0.1); border-color:rgba(255,167,38,0.3); color:#ffcc80;}
.tag.dev{ background:rgba(171,71,188,0.1); border-color:rgba(171,71,188,0.3); color:#d4a4dd;}
.tag.role-detect{ background:rgba(0,188,212,0.1); border-color:rgba(0,188,212,0.3); color:#80deea;}
.tag.role-intercept{ background:rgba(255,152,0,0.1); border-color:rgba(255,152,0,0.3); color:#ffcc80;}
.tag.role-ew{ background:rgba(171,71,188,0.1); border-color:rgba(171,71,188,0.3); color:#d4a4dd;}

/* 시뮬레이션 컨트롤 */
.sim-control{
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
  margin-bottom:14px; padding:11px 14px;
  background:var(--bg-panel); border:1px solid var(--border); border-radius:6px;
}
.sim-control .ctl-group{ display:flex; gap:6px; align-items:center;}
.sim-control label{ font-size:11.5px; color:var(--text-secondary);}
.btn{
  padding:6px 13px; border:1px solid var(--border);
  background:var(--bg-card); color:var(--text-primary);
  border-radius:4px; cursor:pointer; font-size:12px;
  font-family:inherit; transition:all 0.15s;
}
.btn:hover{ background:#2a3a5a;}
.btn.primary{ background:rgba(33,150,243,0.18); border-color:var(--c-info); color:#90caf9;}
.btn.primary:hover{ background:rgba(33,150,243,0.28);}
.btn.danger{ background:rgba(239,83,80,0.18); border-color:var(--c-fail); color:#ef9a9a;}
.btn.danger:hover{ background:rgba(239,83,80,0.28);}
.btn.success{ background:rgba(102,187,106,0.18); border-color:var(--c-success); color:#a5d6a7;}
.btn:disabled{ opacity:0.4; cursor:not-allowed;}

.sim-time{ font-family:'Consolas','Monaco',monospace; font-size:15px; font-weight:700; color:#fff;
  padding:5px 11px; background:var(--bg-card); border-radius:4px;}
.sim-time .lbl{ font-size:9.5px; color:var(--text-muted); font-weight:normal;}

/* 시뮬레이션 메인 레이아웃 */
.sim-layout{ display:grid; grid-template-columns:1fr; gap:14px;}


/* 지도 기반 시뮬레이션 시각화 */
.sim-map-section{
  display:grid; grid-template-columns:minmax(0,1fr) 320px; gap:14px;
  margin-bottom:14px;
}
.sim-map-card,.sim-map-side{
  background:var(--bg-panel); border:1px solid var(--border); border-radius:6px;
  overflow:hidden;
}
.sim-map-head{
  display:flex; justify-content:space-between; align-items:center; gap:10px;
  padding:10px 12px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.12);
}
.sim-map-title{font-size:13px; font-weight:700; color:var(--c-info)}
.sim-map-title.asis{color:var(--c-asis)}
.sim-map-title.tobe{color:var(--c-tobe)}
.sim-map-meta{font-size:10.5px; color:var(--text-muted); text-align:right; line-height:1.35}
.sim-leaflet-map{
  width:100%; height:460px; min-height:420px; background:#07101d;
}
.sim-map-side{padding:10px 12px; display:flex; flex-direction:column; gap:10px; min-height:460px;}
.sim-map-side h3{font-size:12px; color:var(--c-info); margin:0 0 5px 0}
.sim-map-side .map-note{font-size:10.5px; color:var(--text-muted); line-height:1.45;}
.sim-map-stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:7px;}
.sim-map-stat{background:var(--bg-card); border:1px solid var(--border); border-radius:5px; padding:7px 8px;}
.sim-map-stat .k{font-size:9.5px; color:var(--text-muted);}
.sim-map-stat .v{font-family:'Consolas','Monaco',monospace; font-size:16px; font-weight:700; color:#fff; margin-top:2px;}
.sim-map-stat.good .v{color:var(--c-success)}
.sim-map-stat.bad .v{color:var(--c-fail)}
.sim-map-stat.warn .v{color:var(--c-warn)}
.sim-map-track-list{max-height:190px; overflow:auto; display:flex; flex-direction:column; gap:5px;}
.sim-map-track-item{
  background:var(--bg-card); border:1px solid var(--border); border-left:3px solid var(--border-strong);
  border-radius:4px; padding:6px 8px; font-size:10.5px; cursor:pointer;
}
.sim-map-track-item:hover{background:#26364c;}
.sim-map-track-item.ballistic{border-left-color:#ef5350;}
.sim-map-track-item.cruise{border-left-color:#ff9800;}
.sim-map-track-item.aircraft{border-left-color:#42a5f5;}
.sim-map-track-item.uav{border-left-color:#26c6da;}
.sim-map-track-item .top{display:flex; justify-content:space-between; gap:8px; color:#fff; font-weight:700;}
.sim-map-track-item .bottom{color:var(--text-secondary); margin-top:2px; line-height:1.35;}
.sim-map-legend{display:grid; grid-template-columns:1fr 1fr; gap:5px 9px; font-size:10px; color:var(--text-secondary);}
.sim-map-legend span{display:flex; align-items:center; gap:5px;}
.sim-map-legend i{display:inline-block; width:10px; height:10px; border-radius:50%;}
.leaflet-container{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif; background:#07101d;}
.leaflet-control-attribution{background:rgba(10,14,26,.78)!important; color:var(--text-muted)!important; font-size:9px!important;}
.leaflet-control-attribution a{color:#80bfff!important;}
.leaflet-control-zoom a{background:var(--bg-card)!important; color:var(--text-primary)!important; border-color:var(--border)!important;}
.asbs-div-icon{background:transparent; border:none;}
.asbs-map-marker{position:relative; transform:translate(-50%,-50%); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:10px; box-shadow:0 0 10px rgba(0,0,0,.5);}
.asbs-map-marker.c2{width:28px; height:28px; border:2px solid rgba(255,255,255,.8); border-radius:6px; background:#2196F3;}
.asbs-map-marker.asset{width:18px; height:18px; border:1.5px solid rgba(255,255,255,.75); border-radius:50%; background:#607d8b;}
.asbs-map-marker.threat{width:22px; height:22px; border:2px solid rgba(255,255,255,.85); border-radius:50%; background:#ef5350; animation:mapThreatPulse 1.1s infinite ease-in-out;}
.asbs-map-marker.threat.success{background:#66bb6a; animation:none;}
.asbs-map-marker.threat.fail{background:#ef5350; animation:none; box-shadow:0 0 16px rgba(239,83,80,.9);}
.asbs-map-marker.threat.wait{opacity:.55; animation:none;}
@keyframes mapThreatPulse{0%,100%{transform:translate(-50%,-50%) scale(1); box-shadow:0 0 5px currentColor;}50%{transform:translate(-50%,-50%) scale(1.22); box-shadow:0 0 18px currentColor;}}
.map-popup{font-size:11px; line-height:1.45; min-width:190px;}
.map-popup b{color:#111827;}
.map-popup .muted{color:#607080;}
.map-popup .row{display:flex; justify-content:space-between; gap:8px; border-bottom:1px solid #dde3ea; padding:2px 0;}
.map-popup .row:last-child{border-bottom:none;}
@media(max-width:1200px){.sim-map-section{grid-template-columns:1fr}.sim-map-side{min-height:auto}.sim-leaflet-map{height:420px}}

/* C2 화면 그리드 */
.c2-grid{ display:grid; gap:10px;}
.c2-grid.asis{ grid-template-columns:repeat(4, 1fr);}
.c2-grid.tobe{ grid-template-columns:1fr;}
.c2-panel{
  background:var(--bg-panel); border:1px solid var(--border); border-radius:6px;
  padding:10px 12px; min-height:140px;
}
.c2-panel .c2-head{
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid var(--border); padding-bottom:6px; margin-bottom:8px;
}
.c2-panel .c2-name{ font-size:12.5px; font-weight:700;}
.c2-panel .c2-role{ font-size:10px; color:var(--text-muted);}
.c2-panel.kaoc .c2-name{ color:var(--c-kaoc);}
.c2-panel.mcrc .c2-name{ color:var(--c-mcrc);}
.c2-panel.adc2a .c2-name{ color:var(--c-adc2a);}
.c2-panel.kntds .c2-name{ color:var(--c-kntds);}
.c2-panel .c2-body{ font-size:11px; color:var(--text-secondary);}
.c2-panel .c2-stat-row{
  display:flex; justify-content:space-between; padding:3px 0;
  border-bottom:1px dashed rgba(255,255,255,0.04);
}
.c2-panel .c2-stat-row:last-child{ border-bottom:none;}
.c2-panel .stat-k{ color:var(--text-muted);}
.c2-panel .stat-v{ color:#fff; font-weight:600;}
.c2-panel .stat-v.warn{ color:var(--c-warn);}
.c2-panel .stat-v.bad{ color:var(--c-fail);}
.c2-panel .stat-v.good{ color:var(--c-success);}

/* 메시지/이벤트 로그 (C2 화면 하단) */
.c2-log{
  margin-top:8px; max-height:120px; overflow-y:auto;
  font-size:10.5px; font-family:'Consolas','Monaco',monospace;
  background:rgba(0,0,0,0.25); border-radius:3px; padding:5px 7px;
}
.c2-log .log-row{ padding:1px 0; color:var(--text-secondary); line-height:1.4;}
.c2-log .log-row .t{ color:var(--c-info); margin-right:5px;}
.c2-log .log-row.voice .t{ color:var(--c-voice);}
.c2-log .log-row.voice{ color:#fff3a0;}
.c2-log .log-row.success .t{ color:var(--c-success);}
.c2-log .log-row.fail .t{ color:var(--c-fail);}
.c2-log .log-row.miss{ color:var(--text-muted); font-style:italic;}

/* 4분기 모드 분배 바 (To-Be 전용) */
.mode-bar{
  display:flex; gap:6px; margin-bottom:10px;
}
.mode-cell{
  flex:1; padding:8px 10px; border-radius:5px;
  background:var(--bg-panel); border:1px solid var(--border);
  border-left:3px solid var(--border-strong);
}
.mode-cell.m-preauth{ border-left-color:var(--c-mode-preauth);}
.mode-cell.m-auto{ border-left-color:var(--c-mode-auto);}
.mode-cell.m-verify{ border-left-color:var(--c-mode-verify);}
.mode-cell.m-delegate{ border-left-color:var(--c-mode-delegate);}
.mode-cell .mode-name{ font-size:10.5px; color:var(--text-muted); font-weight:600;}
.mode-cell.m-preauth .mode-name{ color:var(--c-mode-preauth);}
.mode-cell.m-auto .mode-name{ color:var(--c-mode-auto);}
.mode-cell.m-verify .mode-name{ color:var(--c-mode-verify);}
.mode-cell.m-delegate .mode-name{ color:var(--c-mode-delegate);}
.mode-cell .mode-detail{ font-size:10px; color:var(--text-secondary); margin-top:3px;}
.mode-cell .mode-count{ font-size:18px; font-weight:700; color:#fff; margin-top:4px;}
.mode-cell .mode-count .total{ font-size:11px; color:var(--text-muted); font-weight:normal;}

/* 항적 킬체인 간트차트 */
.kc-section{
  background:var(--bg-panel); border:1px solid var(--border);
  border-radius:6px; padding:12px 14px;
}
.kc-section h3{
  font-size:13px; color:var(--c-info); margin-bottom:8px;
  display:flex; align-items:center; justify-content:space-between;
}
.kc-section h3 .kc-hint{ font-size:10.5px; color:var(--text-muted); font-weight:normal;}
.kc-legend{
  display:flex; flex-wrap:wrap; gap:11px; font-size:10.5px;
  color:var(--text-muted); margin-bottom:9px;
  border-bottom:1px dashed var(--border); padding-bottom:7px;
}
.kc-legend .lg{ display:flex; align-items:center; gap:4px;}
.kc-legend .lg .sw{ width:11px; height:11px; border-radius:2px;}
.kc-grid{ position:relative;}
.kc-time-axis{
  position:relative; height:24px; margin-left:200px; margin-bottom:4px;
  border-bottom:1px solid var(--border);
}
.kc-time-tick{
  position:absolute; top:0; bottom:0;
  border-left:1px dashed rgba(255,255,255,0.05);
  font-size:9.5px; color:var(--text-muted); padding-left:3px;
  padding-top:6px;
}
.kc-time-now{
  position:absolute; top:-3px; bottom:-200vh; width:2px;
  background:rgba(255,235,59,0.6); z-index:10; pointer-events:none;
  box-shadow:0 0 6px rgba(255,235,59,0.5);
}
.kc-row{
  display:flex; align-items:center; height:24px;
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.kc-row:hover{ background:rgba(255,255,255,0.015);}
.kc-row.t-ballistic{ background:rgba(239,83,80,0.025);}
.kc-row.t-cruise{ background:rgba(255,167,38,0.02);}
.kc-row.t-aircraft{ background:rgba(33,150,243,0.02);}
.kc-row.t-uav{ background:rgba(38,198,218,0.02);}
.kc-label{
  width:200px; flex-shrink:0; padding:0 8px;
  font-size:10.5px; display:flex; align-items:center; gap:5px;
  white-space:nowrap; overflow:hidden;
}
.kc-label .kc-id{ font-family:'Consolas',monospace; font-weight:700; color:#fff; min-width:36px;}
.kc-label .kc-type{
  font-size:9.5px; padding:1px 5px; border-radius:7px;
  background:var(--bg-card); color:var(--text-muted);
}
.kc-label .kc-type.t-ballistic{ background:rgba(239,83,80,0.15); color:#ff9c95;}
.kc-label .kc-type.t-cruise{ background:rgba(255,167,38,0.15); color:#ffd089;}
.kc-label .kc-type.t-aircraft{ background:rgba(33,150,243,0.15); color:#90caf9;}
.kc-label .kc-type.t-uav{ background:rgba(38,198,218,0.15); color:#80deea;}
.kc-label .kc-target{ font-size:9.5px; color:var(--text-muted);}
.kc-bar-area{
  position:relative; flex:1; height:100%;
}
.kc-event{
  position:absolute; top:5px; height:14px;
  border-radius:2px; cursor:pointer; transition:opacity 0.2s;
  font-size:9px; color:#fff; padding:0 3px; line-height:14px;
  white-space:nowrap; overflow:hidden;
}
.kc-event.faded{ opacity:0.25;}
.kc-event:hover{ opacity:1; z-index:20; box-shadow:0 0 0 1px #fff;}
.kc-event.ev-detect{ background:rgba(0,188,212,0.65); border-left:2px solid #00BCD4;}
.kc-event.ev-track{ background:rgba(38,198,218,0.55); border-left:2px solid #26d7e7;}
.kc-event.ev-classify{ background:rgba(66,165,245,0.55); border-left:2px solid #42a5f5;}
.kc-event.ev-decide{ background:rgba(255,235,59,0.55); border-left:2px solid var(--c-kaoc); color:#000;}
.kc-event.ev-assign{ background:rgba(171,71,188,0.55); border-left:2px solid var(--c-control);}
.kc-event.ev-order{ background:rgba(255,152,0,0.6); border-left:2px solid var(--c-intercept);}
.kc-event.ev-engage{ background:rgba(255,87,34,0.7); border-left:2px solid #FF5722;}
.kc-event.ev-bda-success{ background:rgba(102,187,106,0.75); border-left:2px solid var(--c-success);}
.kc-event.ev-bda-fail{ background:rgba(239,83,80,0.75); border-left:2px solid var(--c-fail);}
.kc-event.ev-voice{ background:rgba(255,213,79,0.55); border-left:2px solid var(--c-voice); color:#000;}
.kc-event.ev-wait{ background:rgba(85,102,119,0.35); border-left:2px dashed var(--text-muted); color:var(--text-secondary);}
.kc-event.ev-miss{ background:rgba(120,40,40,0.5); border-left:2px solid #ff5252; color:#ffb4b4;}
.kc-event.future{ opacity:0.3;}

/* 통계 패널 */
.stat-row{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:9px; margin-bottom:14px;
}
.stat-box{
  background:var(--bg-panel); border:1px solid var(--border);
  border-radius:5px; padding:10px 12px;
}
.stat-box .sk{ font-size:10.5px; color:var(--text-muted); margin-bottom:3px;}
.stat-box .sv{ font-size:20px; font-weight:700; color:#fff;}
.stat-box .sd{ font-size:10px; color:var(--text-secondary); margin-top:2px;}
.stat-box.good{ border-left:3px solid var(--c-success);}
.stat-box.good .sv{ color:#a5d6a7;}
.stat-box.bad{ border-left:3px solid var(--c-fail);}
.stat-box.bad .sv{ color:#ef9a9a;}
.stat-box.warn{ border-left:3px solid var(--c-warn);}
.stat-box.warn .sv{ color:#ffcc80;}
.stat-box.info{ border-left:3px solid var(--c-info);}
.stat-box.info .sv{ color:#90caf9;}

/* 비교 통계 (As-Is와 To-Be를 옆에 둘 때) */
.cmp-stat-row{
  display:grid; grid-template-columns:1fr 1fr; gap:14px;
}
.cmp-stat-row > div{ display:contents;}

/* 항적 상세 패널 (클릭 시) */
.track-detail-panel{
  position:fixed; right:0; top:54px; bottom:0; width:380px;
  background:var(--bg-panel); border-left:1px solid var(--border);
  padding:16px; overflow-y:auto; z-index:100;
  transform:translateX(100%); transition:transform 0.25s;
  box-shadow:-4px 0 18px rgba(0,0,0,0.4);
}
.track-detail-panel.open{ transform:translateX(0);}
.track-detail-panel .tdp-close{
  position:absolute; right:14px; top:14px; cursor:pointer;
  font-size:18px; color:var(--text-muted);
}
.tdp-event-list{ margin-top:10px;}
.tdp-event{
  padding:6px 9px; border-left:2px solid var(--border-strong);
  background:var(--bg-card); border-radius:0 3px 3px 0;
  margin-bottom:5px; font-size:11px;
}
.tdp-event.ev-detect{ border-left-color:var(--c-detect);}
.tdp-event.ev-track{ border-left-color:#26d7e7;}
.tdp-event.ev-classify{ border-left-color:var(--c-info);}
.tdp-event.ev-decide{ border-left-color:var(--c-kaoc);}
.tdp-event.ev-assign{ border-left-color:var(--c-control);}
.tdp-event.ev-order{ border-left-color:var(--c-intercept);}
.tdp-event.ev-engage{ border-left-color:#FF5722;}
.tdp-event.ev-bda-success{ border-left-color:var(--c-success);}
.tdp-event.ev-bda-fail{ border-left-color:var(--c-fail);}
.tdp-event.ev-voice{ border-left-color:var(--c-voice);}
.tdp-event.ev-miss{ border-left-color:#ff5252;}
.tdp-event .tdp-t{ font-family:'Consolas',monospace; color:var(--c-info); font-weight:700; margin-right:6px;}
.tdp-event .tdp-actor{ color:var(--text-muted); font-size:9.5px; margin-left:4px;}
.tdp-event .tdp-text{ color:var(--text-primary); margin-top:2px;}

/* 비교 요약 */
.cmp-summary{
  background:linear-gradient(135deg, rgba(38,198,218,0.05), rgba(255,112,67,0.05));
  border:1px solid var(--border); border-radius:6px; padding:14px;
  margin-bottom:14px;
}
.cmp-table{ width:100%; border-collapse:collapse; margin-top:8px; font-size:12px;}
.cmp-table th, .cmp-table td{ padding:8px 10px; border:1px solid var(--border); text-align:center;}
.cmp-table th{ background:var(--bg-card); color:var(--c-info);}
.cmp-table th.h-asis{ color:var(--c-asis);}
.cmp-table th.h-tobe{ color:var(--c-tobe);}
.cmp-table td.label{ text-align:left; color:var(--text-secondary);}
.cmp-table td.asis{ color:#ffab91;}
.cmp-table td.tobe{ color:#80deea;}



/* ============================================================
   C2 문제점 시각화 패널 — 합동성/AOR/음성병목/지역·국지 분리
   ============================================================ */
.problem-visual-section{
  display:grid; grid-template-columns:1.05fr .95fr; gap:14px; margin:14px 0;
}
.problem-card{
  background:var(--bg-panel); border:1px solid var(--border); border-radius:6px;
  padding:12px 14px; min-height:220px;
}
.problem-card h3{font-size:13px; color:var(--c-info); margin-bottom:9px; display:flex; align-items:center; justify-content:space-between; gap:8px;}
.problem-card h3 .mini{font-size:10px; color:var(--text-muted); font-weight:400;}
.problem-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.problem-metric{background:var(--bg-card); border:1px solid var(--border); border-radius:5px; padding:8px 9px;}
.problem-metric .k{font-size:9.5px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.3px;}
.problem-metric .v{font-family:'Consolas','Monaco',monospace; font-size:18px; color:#fff; font-weight:800; margin-top:2px;}
.problem-metric.warn .v{color:var(--c-warn)} .problem-metric.bad .v{color:var(--c-fail)} .problem-metric.good .v{color:var(--c-success)}
.command-chain{display:flex; align-items:stretch; gap:6px; margin:9px 0 7px;}
.chain-node{flex:1; min-width:0; background:#101b2c; border:1px solid #27384e; border-radius:7px; padding:8px 7px; text-align:center; position:relative; transition:all .2s;}
.chain-node.active{border-color:var(--c-info); box-shadow:0 0 14px rgba(66,165,245,.22); background:#102a45;}
.chain-node.blocked{border-color:var(--c-fail); box-shadow:0 0 14px rgba(239,83,80,.18); background:#2a151a;}
.chain-node.delegated{border-color:var(--c-mode-delegate); box-shadow:0 0 14px rgba(181,140,255,.18); background:#201631;}
.chain-tier{font-size:8.5px; color:var(--text-muted); margin-bottom:3px;}
.chain-role{font-size:10.5px; color:#fff; font-weight:700; line-height:1.25;}
.chain-queue{font-family:'Consolas','Monaco',monospace; font-size:10px; color:var(--c-warn); margin-top:4px;}
.chain-arrow{width:18px; display:flex; align-items:center; justify-content:center; color:#4d6682; font-size:15px; font-weight:900;}
.chain-arrow.voice{color:var(--c-voice)} .chain-arrow.data{color:var(--c-data)}
.bottleneck-meter{margin-top:8px; background:#0c1523; border:1px solid #22344a; border-radius:7px; padding:9px;}
.meter-row{display:grid; grid-template-columns:98px minmax(0,1fr) 54px; gap:7px; align-items:center; margin:6px 0;}
.meter-label{font-size:9.5px; color:var(--text-muted);}
.meter-track{height:8px; background:#162234; border-radius:99px; overflow:hidden; position:relative;}
.meter-fill{height:100%; border-radius:99px; transition:width .25s; background:var(--c-info);}
.meter-fill.warn{background:var(--c-warn)} .meter-fill.bad{background:var(--c-fail)} .meter-fill.good{background:var(--c-success)}
.meter-val{font-family:'Consolas','Monaco',monospace; font-size:10px; color:#fff; text-align:right;}
.aor-visual{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:8px;}
.aor-zone{position:relative; min-height:104px; border-radius:8px; border:1px solid var(--border); background:radial-gradient(circle at 50% 42%, rgba(255,255,255,.035), rgba(0,0,0,.12)); overflow:hidden; padding:8px;}
.aor-zone:before,.aor-zone:after{content:''; position:absolute; border-radius:50%; opacity:.24; border:2px solid;}
.aor-zone.air:before{width:96px;height:96px;left:16px;top:12px;border-color:#4FC3F7;background:rgba(79,195,247,.12)}
.aor-zone.navy:before{width:108px;height:108px;left:22px;top:2px;border-color:#5C6BC0;background:rgba(92,107,192,.12)}
.aor-zone.army:before{width:74px;height:74px;left:38px;top:28px;border-color:#66BB6A;background:rgba(102,187,106,.14)}
.aor-zone.overlap:before{width:104px;height:104px;left:10px;top:4px;border-color:#4FC3F7;background:rgba(79,195,247,.11)}
.aor-zone.overlap:after{width:78px;height:78px;left:55px;top:29px;border-color:#66BB6A;background:rgba(102,187,106,.13)}
.aor-title{position:relative; z-index:1; font-size:10px; color:#fff; font-weight:700;}
.aor-text{position:absolute; z-index:1; left:8px; right:8px; bottom:8px; font-size:9.5px; color:var(--text-secondary); line-height:1.35;}
.split-flow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;}
.split-col{border:1px solid var(--border); background:var(--bg-card); border-radius:6px; padding:9px; min-height:102px;}
.split-col .title{font-size:11px; font-weight:700; margin-bottom:5px;} .split-col .body{font-size:10px; color:var(--text-secondary); line-height:1.45;}
.split-col.local .title{color:#66BB6A}.split-col.area .title{color:#FF9800}.split-col.integrated .title{color:var(--c-tobe)}
.problem-note{font-size:10.5px; color:var(--text-secondary); line-height:1.5; margin-top:8px;}
.problem-note b{color:#fff}.issue-pulse{animation:issuePulse 1.1s infinite ease-in-out;}
@keyframes issuePulse{0%,100%{opacity:.65}50%{opacity:1;filter:brightness(1.3)}}
@media(max-width:1200px){.problem-visual-section{grid-template-columns:1fr}.problem-grid,.split-flow{grid-template-columns:1fr}.aor-visual{grid-template-columns:1fr}}

/* 스크롤바 */
::-webkit-scrollbar{ width:9px; height:9px;}
::-webkit-scrollbar-track{ background:var(--bg-secondary);}
::-webkit-scrollbar-thumb{ background:#2a3a4a; border-radius:4px;}
::-webkit-scrollbar-thumb:hover{ background:#3a4a5a;}

/* 작은 헬퍼 */
.muted{ color:var(--text-muted);}
.small{ font-size:10.5px;}
.hl-asis{ color:var(--c-asis);}
.hl-tobe{ color:var(--c-tobe);}
.hl-warn{ color:var(--c-warn);}
.hl-bad{ color:var(--c-fail);}
.hl-good{ color:var(--c-success);}
hr.sep{ border:none; border-top:1px dashed var(--border); margin:10px 0;}

/* 위협 카드 */
.threat-card{
  background:var(--bg-panel); border:1px solid var(--border);
  border-left:3px solid var(--c-threat); border-radius:5px; padding:10px 12px;
}
.threat-card.cat-탄도미사일{ border-left-color:#ef5350;}
.threat-card.cat-순항미사일{ border-left-color:#FF9800;}
.threat-card.cat-무인기{ border-left-color:#26c6da;}
.threat-card.cat-초음속미사일{ border-left-color:#ab47bc;}
.threat-card .tc-name{ font-size:13px; font-weight:600; color:#fff; margin-bottom:3px;}
.threat-card .tc-cat{ font-size:10.5px; color:var(--text-muted); margin-bottom:6px;}
.threat-card .tc-row{ font-size:11px; color:var(--text-secondary); margin:2px 0;}
.threat-card .tc-row b{ color:var(--text-primary); display:inline-block; min-width:55px;}

/* 시뮬레이션 결과 토스트 */
.sim-toast{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:var(--bg-card); border:1px solid var(--c-info);
  padding:11px 18px; border-radius:5px; z-index:200;
  font-size:12.5px; color:#fff;
  box-shadow:0 8px 28px rgba(0,0,0,0.5);
  display:none;
}
.sim-toast.show{ display:block; animation:fadein 0.3s;}
@keyframes fadein{ from{opacity:0; transform:translate(-50%,8px);} to{opacity:1; transform:translate(-50%,0);} }

/* 핵심 문제점 박스 (As-Is) */
.issue-box{
  background:rgba(239,83,80,0.06); border:1px solid rgba(239,83,80,0.25);
  border-radius:5px; padding:9px 12px; margin-bottom:8px;
}
.issue-box .ib-title{ font-weight:600; color:var(--c-fail); font-size:12px; margin-bottom:3px;}
.issue-box .ib-body{ font-size:11px; color:var(--text-secondary);}
.benefit-box{
  background:rgba(38,198,218,0.06); border:1px solid rgba(38,198,218,0.25);
  border-radius:5px; padding:9px 12px; margin-bottom:8px;
}
.benefit-box .ib-title{ font-weight:600; color:var(--c-tobe); font-size:12px; margin-bottom:3px;}
.benefit-box .ib-body{ font-size:11px; color:var(--text-secondary);}

/* footer */
.foot{
  padding:8px 22px; font-size:10.5px; color:var(--text-muted);
  border-top:1px solid var(--border); background:var(--bg-secondary);
}
</style>
</head>

/* ============================================================
   결정론적 난수 생성기 (시드 기반) - 실행마다 다른 결과
   ============================================================ */
class SeededRNG {
  constructor(seed){
    this.seed = (seed >>> 0) || ((Date.now() & 0xffffffff) >>> 0);
    this._state = this.seed || 1;
  }
  next(){
    // Mulberry32
    let t = (this._state += 0x6D2B79F5) >>> 0;
    t = Math.imul(t ^ (t>>>15), t | 1);
    t ^= t + Math.imul(t ^ (t>>>7), t | 61);
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  }
  range(min,max){ return min + this.next()*(max-min); }
  int(min,max){ return Math.floor(this.range(min,max+0.999999)); }
  normal(mean, std){
    // Box-Muller
    const u1=Math.max(1e-9, this.next()), u2=this.next();
    return mean + std * Math.sqrt(-2*Math.log(u1)) * Math.cos(2*Math.PI*u2);
  }
  pick(arr){ return arr[this.int(0, arr.length-1)]; }
  chance(p){ return this.next() < p; }
}

/* ============================================================
   항적 30개 생성
   ============================================================ */
function generateTracks(rng){
  const tracks = [];
  let idx = 1;
  const order = ['ballistic','cruise','aircraft','uav'];
  const labels = {ballistic:'탄도탄', cruise:'순항', aircraft:'전투기', uav:'무인기'};
  const sites = SIM_CONFIG.targetSites;
  const samplesByType = {
    ballistic: ['NK_KN23','NK_KN24','NK_KN25','NK_NODONG','NK_HS12','NK_HS16B'],
    cruise:    ['NK_HWASAL1','NK_HWASAL2','NK_PH331'],
    aircraft:  ['NK_MIG29','NK_MIG23','NK_SU25'],   // 가상 (실 데이터에 없음)
    uav:       ['NK_SB4','NK_SB9','NK_KUMSUNG','NK_BANGHYUN']
  };

  for(const type of order){
    const n = SIM_CONFIG.trackComposition[type];
    const win = SIM_CONFIG.arrivalWindow[type];
    for(let i=0;i<n;i++){
      const arrivalT = rng.range(win.min, win.max);
      // 발사 시점 = 도래 시점 - 비행시간 (간략화)
      const flightTime = {ballistic:rng.range(360,540), cruise:rng.range(420,720), aircraft:rng.range(360,600), uav:rng.range(600,900)}[type];
      const launchT = Math.max(0, arrivalT - flightTime);
      const id = 'T-' + String(idx).padStart(2,'0');
      const threatModel = rng.pick(samplesByType[type]);
      const target = rng.pick(sites);
      tracks.push({
        id, type, label:labels[type], threatModel,
        launchT, arrivalT, target,
        // 첫 탐지 시간: 발사 후 detectionDelay
        firstDetectT: launchT + Math.max(5, rng.normal(SIM_CONFIG.detectionDelay[type].mean, SIM_CONFIG.detectionDelay[type].std)),
        // 탐지 성공 여부
        detected: rng.chance(SIM_CONFIG.detectionProb[type]),
        // RCS factor (영향 시연용)
        rcsFactor: rng.range(0.7, 1.2)
      });
      idx++;
    }
  }
  // 시간 순 정렬은 보존하지 않고 ID 순
  return tracks;
}

/* ============================================================
   시뮬레이션 실행 — As-Is
     - 다계층 구조 (합참-공작사-각군-예하)
     - 음성/VTC 협조 한계
     - AOR 중첩 시 중복 교전
     - 항적 5~10개 이상 시 음성 매개 한계
   ============================================================ */
function simulateAsIs(tracks, rng){
  const events = []; // {trackId, t, kind, actor, text, success?}
  const log = [];    // C2 로그 {c2, t, kind, text}
  // 자산 잔탄 복사
  const loadout = {...SIM_CONFIG.assetLoadout};

  // C2별 결심 큐 (시간순 처리)
  // 음성 매개로는 동시에 concurrentLimit 개수만 처리 가능
  const decisionQueues = {KAOC:[], MCRC:[], ADC2A:[], KNTDS:[]};

  // VTC 소집 (T+30~60초에 시작, 5분 소요)
  const vtcSetupStart = 30;
  const vtcSetupEnd = vtcSetupStart + SIM_CONFIG.c2DelayAsIs.vtcSetup; // T+330초

  // 합참 VTC 소집 이벤트
  events.push({trackId:'SYS', t: vtcSetupStart, kind:'voice', actor:'합참', text:'합참 작전본부장: 합동방공 VTC 소집 (5분 소요)'});
  events.push({trackId:'SYS', t: vtcSetupEnd,   kind:'voice', actor:'합참', text:'VTC 소집 완료. 군별 음성 분배 시작'});

  // 항적 처리 (시간순)
  const sortedTracks = [...tracks].sort((a,b)=>a.firstDetectT - b.firstDetectT);

  // C2별 가용 시작시각 (concurrentLimit 적용)
  // 음성/VTC는 N개의 병렬 채널 → N개의 "agent busy time" 배열로 모델링
  const channels = SIM_CONFIG.c2DelayAsIs.concurrentLimit;
  const c2Channels = {
    KAOC:  Array(channels).fill(vtcSetupEnd),
    MCRC:  Array(channels).fill(vtcSetupEnd),
    ADC2A: Array(channels).fill(vtcSetupEnd),
    KNTDS: Array(channels).fill(vtcSetupEnd)
  };
  // 합참(작전본부장) 음성 분배 — 단일 채널 직렬 병목
  // "공군 쏴라, 해작사 쏴라, 1군단 쏴라" 식 음성 분배는 한 사람이 순차 처리
  let jointDispatchAvail = vtcSetupEnd;

  for(const tr of sortedTracks){
    const trEvents = [];

    // 1) 탐지
    if(!tr.detected){
      // 탐지 실패 - 표적 도달
      trEvents.push({t: tr.firstDetectT, kind:'ev-miss', actor:'센서망', text:'탐지 실패. 항적 미생성 → 표적 도달 가능성 높음'});
      trEvents.push({t: tr.arrivalT, kind:'ev-bda-fail', actor:'표적', text:`${tr.target} 표적 도달 (탐지 실패)`, success:false, final:true});
      events.push(...trEvents.map(e=>({...e, trackId:tr.id})));
      continue;
    }
    trEvents.push({t: tr.firstDetectT, kind:'ev-detect', actor:'센서망', text:`첫 탐지 (${tr.type==='ballistic'?'그린파인/SPY-1D':tr.type==='aircraft'||tr.type==='cruise'?'E-737':'TPS-880K'})`});

    // 2) 트랙 형성 + 식별/분류 (10~30초)
    const trackT = tr.firstDetectT + Math.max(5, rng.normal(15,5));
    const classifyT = trackT + Math.max(5, rng.normal(20, 8));
    trEvents.push({t: trackT, kind:'ev-track', actor:'센서망', text:'트랙 번호 부여 / 항적 형성'});
    trEvents.push({t: classifyT, kind:'ev-classify', actor:'센서망', text:`위협 분류: ${tr.label} 추정`});

    // 3) C2 결심 - As-Is의 핵심 문제: VTC 소집 전엔 결심 안됨, 그 후엔 음성 분배 큐에 들어감
    let assignedC2 = '';
    // 우선 자산 매칭 후보 - 위협별 1차 추천 자산
    const candidates = SIM_CONFIG.threatPrimaryShooters[tr.type];
    // 잔탄 있는 자산만
    const avail = candidates.filter(a => (loadout[a]||0) > 0);
    if(avail.length === 0){
      trEvents.push({t: classifyT+5, kind:'ev-miss', actor:'C2', text:'가용 자산 없음 (잔탄 소진)'});
      trEvents.push({t: tr.arrivalT, kind:'ev-bda-fail', actor:'표적', text:`${tr.target} 표적 도달 (자산 고갈)`, success:false, final:true});
      events.push(...trEvents.map(e=>({...e, trackId:tr.id})));
      continue;
    }
    // 1차 추천 자산 선택 (잔탄 많고 SSKP 높은 순)
    const shooter = avail.slice(0,5).sort((a,b)=>(SIM_CONFIG.sskp[b]?.[tr.type]||0)-(SIM_CONFIG.sskp[a]?.[tr.type]||0))[0];
    assignedC2 = SIM_CONFIG.asIsC2Map[shooter] || 'MCRC';

    // VTC 소집 전이면 결심 불가
    let decisionStart = Math.max(classifyT, vtcSetupEnd);
    // VTC 소집 중인데 도달 직전이면 - 탄도탄은 너무 늦음
    if(tr.type === 'ballistic' && classifyT < vtcSetupEnd){
      trEvents.push({t: classifyT, kind:'ev-wait', actor:'C2', text:`탄도탄 탐지. 합참 VTC 소집 대기 중 (T+${(vtcSetupEnd/60).toFixed(1)}분에 완료)`});
    }
    // 음성 분배 큐 - 단계1: 합참 작전본부장의 단일 채널 직렬 분배
    //  "공군 쏴라, 해작사 쏴라" 식 음성 명령은 한 사람이 순차 처리
    const jointDispatchDelay = Math.max(20, rng.normal(30, 8));
    const jointStart = Math.max(classifyT, jointDispatchAvail);
    const jointEnd = jointStart + jointDispatchDelay;
    jointDispatchAvail = jointEnd;
    // 단계2: 해당 군 C2의 채널에서 결심 처리
    const chans = c2Channels[assignedC2];
    let earliestChanIdx = 0;
    for(let i=1;i<chans.length;i++) if(chans[i] < chans[earliestChanIdx]) earliestChanIdx = i;
    const c2Avail = chans[earliestChanIdx];
    decisionStart = Math.max(jointEnd, c2Avail);
    const decisionDelay = Math.max(15, rng.normal(SIM_CONFIG.c2DelayAsIs.perTrack.mean, SIM_CONFIG.c2DelayAsIs.perTrack.std));
    const decisionT = decisionStart + decisionDelay;
    // 채널 점유 시간 갱신
    chans[earliestChanIdx] = decisionT;

    trEvents.push({t: jointStart, kind:'ev-voice', actor:'합참 작전본부장', text:`음성 분배(직렬): "${assignedC2==='KAOC'?'공군':assignedC2==='KNTDS'?'해작사':assignedC2==='ADC2A'?'1군단/수방사':'KAOC'} 쏴라" (단일 채널 대기열)`});
    trEvents.push({t: decisionStart, kind:'ev-voice', actor:'합참/KAOC', text:`군별 음성 협의 (${assignedC2})`});
    trEvents.push({t: decisionT, kind:'ev-decide', actor:assignedC2, text:`${assignedC2} 작전관: ${shooter} 교전 결심 (음성 보고)`});

    // 4) 자산 매칭 (음성 → 비고 데이터화 안됨)
    const assignT = decisionT + Math.max(5, rng.normal(15, 5));
    trEvents.push({t: assignT, kind:'ev-assign', actor:assignedC2, text:`자산 할당: ${getShooterName(shooter)}`});

    // 5) 교전 명령 + 발사 (음성 전파 지연 가능)
    let orderT = assignT + Math.max(8, rng.normal(20, 8));
    // 음성 전파 누락 발생 시 추가 지연
    if(rng.chance(SIM_CONFIG.c2DelayAsIs.voiceLossRate)){
      const voiceRelayDelay = Math.max(30, rng.normal(SIM_CONFIG.c2DelayAsIs.voiceRelay.mean, SIM_CONFIG.c2DelayAsIs.voiceRelay.std));
      trEvents.push({t: orderT, kind:'ev-voice', actor:assignedC2, text:`음성 전파 누락 → 전화 재확인 (+${voiceRelayDelay.toFixed(0)}s)`});
      orderT += voiceRelayDelay;
    }
    trEvents.push({t: orderT, kind:'ev-order', actor:assignedC2, text:`교전명령 하달 → ${getShooterName(shooter)}`});

    // 6) 발사 + 교전 결과
    const engageT = orderT + Math.max(8, rng.normal(12,4));
    // 표적 도달 전에 교전해야 함
    if(engageT >= tr.arrivalT){
      // 너무 늦음 - 표적 도달
      trEvents.push({t: tr.arrivalT, kind:'ev-bda-fail', actor:'표적', text:`${tr.target} 표적 도달 (교전 지연: 결심까지 ${((engageT-tr.firstDetectT)/60).toFixed(1)}분)`, success:false, final:true});
      events.push(...trEvents.map(e=>({...e, trackId:tr.id})));
      continue;
    }
    // 발사
    loadout[shooter] = (loadout[shooter]||0) - 1;
    const sskp = SIM_CONFIG.sskp[shooter]?.[tr.type] || 0.3;
    // 1차 사격
    const hit1 = rng.chance(sskp);
    trEvents.push({t: engageT, kind:'ev-engage', actor:getShooterName(shooter), text:`1차 발사 (SSKP=${sskp.toFixed(2)})`});
    let finalHit = hit1;
    let lastEngageT = engageT;
    let shotCount = 1;

    if(!hit1 && (loadout[shooter]||0) > 0 && (engageT + 25) < tr.arrivalT){
      // 2차 발사 (re-engagement)
      loadout[shooter]--;
      const hit2 = rng.chance(sskp);
      lastEngageT = engageT + Math.max(15, rng.normal(20,6));
      shotCount = 2;
      trEvents.push({t: lastEngageT, kind:'ev-engage', actor:getShooterName(shooter), text:`2차 발사 (재교전)`});
      finalHit = hit2;
    }

    // AOR 중첩 중복교전 (As-Is 특성)
    let dup = null;
    if(rng.chance(SIM_CONFIG.c2DelayAsIs.aorOverlapDup)){
      // 다른 군에서도 동시에 교전
      const otherC2s = ['MCRC','ADC2A','KNTDS','KAOC'].filter(c=>c!==assignedC2);
      const dupC2 = rng.pick(otherC2s);
      const otherCandidates = candidates.filter(a => SIM_CONFIG.asIsC2Map[a]===dupC2 && (loadout[a]||0)>0);
      if(otherCandidates.length){
        const otherShooter = otherCandidates[0];
        loadout[otherShooter]--;
        const dupT = engageT + Math.max(2, rng.normal(6,2));
        trEvents.push({t: dupT, kind:'ev-voice', actor:dupC2, text:`⚠ 중복교전: ${getShooterName(otherShooter)} 동시 발사 (AOR 중첩, 미인지)`});
        dup = {c2:dupC2, shooter:otherShooter};
      }
    }

    // BDA
    const bdaT = lastEngageT + Math.max(20, rng.normal(35, 12));
    if(finalHit){
      trEvents.push({t: bdaT, kind:'ev-bda-success', actor:'BDA', text:`격추 (${shotCount}발 발사, ${dup?'중복교전 발생':'단일'})`, success:true, final:true, shooter, shotCount, dup});
    } else {
      // 격추 실패 → 표적 도달
      const arrT = Math.min(tr.arrivalT, bdaT + 5);
      trEvents.push({t: arrT, kind:'ev-bda-fail', actor:'BDA', text:`격추 실패 → ${tr.target} 표적 도달`, success:false, final:true, shooter, shotCount, dup});
    }
    events.push(...trEvents.map(e=>({...e, trackId:tr.id, c2:assignedC2, shooter})));
  }

  return {events, finalLoadout: loadout};
}

/* ============================================================
   시뮬레이션 실행 — To-Be (통합방공체계)
     - 통합 COP, KAOC 중심 통합 교전통제
     - 4분기 처리 모드 (사전승인/자동채택/인간검증/분권위임)
     - 분권 트리거 자동 권고
   ============================================================ */
function simulateToBe(tracks, rng){
  const events = [];
  const loadout = {...SIM_CONFIG.assetLoadout};

  // 시스템 이벤트 (시작점)
  events.push({trackId:'SYS', t: 30, kind:'voice', actor:'시스템', text:'통합 COP에 30개 항적 동시 표출. 자동 위협 분류 시작'});
  events.push({trackId:'SYS', t: 60, kind:'voice', actor:'시스템', text:'분권 트리거 자동 권고: N=30>임계20, 복잡도 0.85, 평균 교전창 8분 → KAOC 분권 모드 채택'});
  events.push({trackId:'SYS', t: 90, kind:'voice', actor:'KAOC', text:'4분기 처리 모드 동시 작동 (사전승인 4 / 자동채택 6 / 인간검증 8 / 분권위임 12)'});

  const sortedTracks = [...tracks].sort((a,b)=>a.firstDetectT - b.firstDetectT);

  // 4분기 모드 배정 - 위협 유형 기반
  // - 탄도탄 4: 사전승인 자동교전
  // - 순항 6: 자동채택 / 순항 2: 인간검증
  // - 전투기 6: 인간검증
  // - 무인기 12: 분권위임 (각 작전사/이지스 CIC)
  const tracksByType = {ballistic:[], cruise:[], aircraft:[], uav:[]};
  sortedTracks.forEach(t => tracksByType[t.type].push(t));
  // 순항 8개 중 6개 자동채택, 2개 인간검증
  const cruiseAuto = tracksByType.cruise.slice(0,6);
  const cruiseVerify = tracksByType.cruise.slice(6);

  const modeAssign = {}; // trackId -> mode
  tracksByType.ballistic.forEach(t => modeAssign[t.id] = 'preauth');
  cruiseAuto.forEach(t => modeAssign[t.id] = 'auto');
  cruiseVerify.forEach(t => modeAssign[t.id] = 'verify');
  tracksByType.aircraft.forEach(t => modeAssign[t.id] = 'verify');
  tracksByType.uav.forEach(t => modeAssign[t.id] = 'delegate');

  // 분권위임 - 12개 UAV를 3개 권역으로 분배 (1군단 4 / 수방사 4 / 동해 이지스 CIC 4)
  const uavDelegate = {1:'1군단/ADC2A', 2:'수방사/ADC2A', 3:'동해 이지스 CIC/KNTDS'};
  tracksByType.uav.forEach((t,i) => modeAssign[t.id+'_unit'] = uavDelegate[(i%3)+1]);

  for(const tr of sortedTracks){
    const trEvents = [];
    const mode = modeAssign[tr.id];

    // 1) 탐지
    if(!tr.detected){
      // To-Be에서도 일부 탐지 실패는 가능 - 단, 통합 센서융합으로 더 잘 탐지
      // To-Be에서는 탐지 확률을 약간 보정
      if(rng.chance(0.85)){
        // 통합 센서융합으로 늦게라도 탐지 성공
        tr.detected = true;
        const lateDetect = tr.firstDetectT + rng.range(20, 60);
        trEvents.push({t: lateDetect, kind:'ev-detect', actor:'통합 센서융합', text:'통합 COP 다중센서 융합으로 늦은 탐지 성공'});
        tr.firstDetectT = lateDetect;
      } else {
        trEvents.push({t: tr.firstDetectT, kind:'ev-miss', actor:'센서망', text:'탐지 실패'});
        trEvents.push({t: tr.arrivalT, kind:'ev-bda-fail', actor:'표적', text:`${tr.target} 표적 도달 (탐지 실패)`, success:false, final:true});
        events.push(...trEvents.map(e=>({...e, trackId:tr.id})));
        continue;
      }
    }
    if(!trEvents.some(e=>e.kind==='ev-detect'))
      trEvents.push({t: tr.firstDetectT, kind:'ev-detect', actor:'통합 센서융합', text:'통합 COP 자동 표출 (다중센서 융합)'});

    // 2) 트랙 형성 + 자동 분류 (To-Be: 동시 처리)
    const trackT = tr.firstDetectT + Math.max(3, rng.normal(8, 2));
    const classifyT = trackT + Math.max(3, rng.normal(10, 3));
    trEvents.push({t: trackT, kind:'ev-track', actor:'통합 COP', text:'트랙 자동 생성 / 다중센서 융합'});
    trEvents.push({t: classifyT, kind:'ev-classify', actor:'통합 COP', text:`자동 분류: ${tr.label} (신뢰도 ${(rng.range(0.82,0.97)).toFixed(2)})`});

    // 3) 모드별 결심
    let decisionT, decisionDelay, decisionActor, decisionText;
    const cfg = SIM_CONFIG.c2DelayToBe;
    if(mode === 'preauth'){
      decisionDelay = Math.max(2, rng.normal(cfg.autoEngage.mean, cfg.autoEngage.std));
      decisionActor = '시스템 (사전위임 ROE)';
      decisionText = '사전승인 자동교전 활성화 (별도 결심 불필요)';
    } else if(mode === 'auto'){
      decisionDelay = Math.max(5, rng.normal(cfg.autoAdopt.mean, cfg.autoAdopt.std));
      decisionActor = '시스템 (자동채택)';
      decisionText = '신뢰도≥0.85 → 자동 채택, KAOC 모니터링';
    } else if(mode === 'verify'){
      decisionDelay = Math.max(15, rng.normal(cfg.humanVerify.mean, cfg.humanVerify.std));
      decisionActor = 'KAOC 작전본부장';
      decisionText = '인간 검증 결심 (KAOC)';
    } else {
      decisionDelay = Math.max(8, rng.normal(cfg.delegate.mean, cfg.delegate.std));
      decisionActor = modeAssign[tr.id+'_unit'];
      decisionText = `분권위임 결심 (${decisionActor})`;
    }
    decisionT = classifyT + decisionDelay;
    trEvents.push({t: decisionT, kind:'ev-decide', actor:decisionActor, text:decisionText, mode});

    // 4) 자산 매칭 (통합 통제로 군별 경계 없음)
    const candidates = SIM_CONFIG.threatPrimaryShooters[tr.type];
    const avail = candidates.filter(a => (loadout[a]||0) > 0);
    if(avail.length === 0){
      trEvents.push({t: decisionT+3, kind:'ev-miss', actor:'KAOC', text:'가용 자산 없음 (잔탄 소진)'});
      trEvents.push({t: tr.arrivalT, kind:'ev-bda-fail', actor:'표적', text:`${tr.target} 표적 도달 (자산 고갈)`, success:false, final:true});
      events.push(...trEvents.map(e=>({...e, trackId:tr.id, mode})));
      continue;
    }
    // To-Be: 통합 매칭 - SSKP 최고 자산 선택
    const shooter = avail.sort((a,b)=>(SIM_CONFIG.sskp[b]?.[tr.type]||0)-(SIM_CONFIG.sskp[a]?.[tr.type]||0))[0];
    const c2 = SIM_CONFIG.asIsC2Map[shooter] || 'KAOC';

    const assignT = decisionT + Math.max(3, rng.normal(7, 2));
    trEvents.push({t: assignT, kind:'ev-assign', actor:'KAOC 통합매칭', text:`최적 자산 할당: ${getShooterName(shooter)} (군별 경계 없이)`});

    // 5) 교전 명령 (자동 데이터링크, 매우 빠름)
    const orderT = assignT + Math.max(3, rng.normal(5, 2));
    trEvents.push({t: orderT, kind:'ev-order', actor:'KAOC', text:`교전명령 자동 하달 (데이터링크) → ${getShooterName(shooter)}`});

    // 6) 발사 + 교전
    const engageT = orderT + Math.max(4, rng.normal(8,3));
    if(engageT >= tr.arrivalT){
      trEvents.push({t: tr.arrivalT, kind:'ev-bda-fail', actor:'표적', text:`${tr.target} 표적 도달 (교전 지연)`, success:false, final:true});
      events.push(...trEvents.map(e=>({...e, trackId:tr.id, mode, c2, shooter})));
      continue;
    }
    loadout[shooter]--;
    const sskp = SIM_CONFIG.sskp[shooter]?.[tr.type] || 0.3;
    const hit1 = rng.chance(sskp);
    trEvents.push({t: engageT, kind:'ev-engage', actor:getShooterName(shooter), text:`1차 발사 (SSKP=${sskp.toFixed(2)})`});
    let finalHit = hit1, lastEngageT = engageT, shotCount = 1;

    if(!hit1 && (loadout[shooter]||0) > 0 && (engageT + 22) < tr.arrivalT){
      loadout[shooter]--;
      const hit2 = rng.chance(sskp);
      lastEngageT = engageT + Math.max(12, rng.normal(16,5));
      shotCount = 2;
      trEvents.push({t: lastEngageT, kind:'ev-engage', actor:getShooterName(shooter), text:`2차 발사 (자동 재교전)`});
      finalHit = hit2;
      // To-Be: 또다른 자산으로 재교전 가능
      if(!hit2 && tr.type==='ballistic' && (engageT + 50) < tr.arrivalT){
        const altCand = avail.filter(a=>a!==shooter);
        if(altCand.length){
          const altShooter = altCand[0];
          if((loadout[altShooter]||0)>0){
            loadout[altShooter]--;
            const altSskp = SIM_CONFIG.sskp[altShooter]?.[tr.type] || 0.3;
            const hit3 = rng.chance(altSskp);
            lastEngageT = lastEngageT + Math.max(15, rng.normal(20,6));
            shotCount = 3;
            trEvents.push({t: lastEngageT, kind:'ev-engage', actor:getShooterName(altShooter), text:`3차 발사 - 다른 자산 자동 인수 (${getShooterName(altShooter)})`});
            finalHit = hit3;
          }
        }
      }
    }

    // BDA (자동)
    const bdaT = lastEngageT + Math.max(10, rng.normal(18,5));
    if(finalHit){
      trEvents.push({t: bdaT, kind:'ev-bda-success', actor:'BDA 자동', text:`격추 (${shotCount}발 발사)`, success:true, final:true, shooter, shotCount});
    } else {
      const arrT = Math.min(tr.arrivalT, bdaT + 5);
      trEvents.push({t: arrT, kind:'ev-bda-fail', actor:'BDA 자동', text:`격추 실패 → ${tr.target} 표적 도달`, success:false, final:true, shooter, shotCount});
    }
    events.push(...trEvents.map(e=>({...e, trackId:tr.id, mode, c2, shooter})));
  }

  return {events, finalLoadout: loadout};
}

/* ============================================================
   자산명 변환
   ============================================================ */
function getShooterName(id){
  const a = KAMD_DATA.kr_assets.find(x => x.asset_id === id);
  return a ? a.asset_name : id;
}

/* ============================================================
   결과 통계 계산
   ============================================================ */
function computeStats(events, tracks){
  const byTrack = {}; // trackId -> {final, success?, shotCount, ...}
  events.forEach(e => {
    if(e.trackId === 'SYS') return;
    if(!byTrack[e.trackId]) byTrack[e.trackId] = {events:[]};
    byTrack[e.trackId].events.push(e);
    if(e.final){
      byTrack[e.trackId].finalEvent = e;
      byTrack[e.trackId].success = e.success === true;
    }
  });
  let success = 0, fail = 0, undetected = 0, processed = 0;
  let totalShots = 0, duplicates = 0;
  let voiceMsgs = events.filter(e=>e.kind==='ev-voice').length;
  const byType = {ballistic:{s:0,f:0,total:0}, cruise:{s:0,f:0,total:0}, aircraft:{s:0,f:0,total:0}, uav:{s:0,f:0,total:0}};
  tracks.forEach(tr => {
    byType[tr.type].total++;
    const tk = byTrack[tr.id];
    if(!tk) { undetected++; return; }
    if(tk.success){ success++; byType[tr.type].s++; }
    else { fail++; byType[tr.type].f++; }
    processed++;
    tk.events.forEach(e=>{
      if(e.kind==='ev-engage') totalShots++;
      if(e.dup) duplicates++;
    });
  });
  return {success, fail, undetected, processed, totalShots, duplicates, voiceMsgs, byTrack, byType, total:tracks.length};
}

const SIM_STATE = {
  asis: null,   // {tracks, events, stats, loadout}
  tobe: null,
  seed: 0,
  currentTime: 0,  // 0~1800 (시뮬레이션 초)
  playing: false,
  playSpeed: 30,   // 30배속
  rafId: null,
  lastRealTime: 0,
  activeTab: 'overview',
  selectedTrack: null  // 상세 보기
};

/* ============================================================
   시뮬레이션 실행 (양쪽 동시)
   ============================================================ */
function runSimulations(seed){
  const rng1 = new SeededRNG(seed);
  const tracksAsIs = generateTracks(rng1);
  const r1 = simulateAsIs(tracksAsIs, rng1);
  const stats1 = computeStats(r1.events, tracksAsIs);

  // 동일 항적으로 To-Be 실행 (다른 RNG 분기)
  const rng2 = new SeededRNG(seed + 999999);
  // 같은 항적 구성을 쓰기 위해 deep copy
  const tracksToBe = JSON.parse(JSON.stringify(tracksAsIs));
  // To-Be에서는 일부 항적이 As-Is에서 탐지 실패였더라도 (통합 센서융합) 복구 가능
  const r2 = simulateToBe(tracksToBe, rng2);
  const stats2 = computeStats(r2.events, tracksToBe);

  SIM_STATE.seed = seed;
  SIM_STATE.asis = {tracks:tracksAsIs, events:r1.events, stats:stats1, loadout:r1.finalLoadout};
  SIM_STATE.tobe = {tracks:tracksToBe, events:r2.events, stats:stats2, loadout:r2.finalLoadout};
}

/* ============================================================
   유틸: 시간 포맷 / 이스케이프 / 백분율 위치 계산
   ============================================================ */
function fmtT(sec){
  if(sec === undefined || sec === null || isNaN(sec)) return '—';
  const m = Math.floor(sec/60), s = Math.floor(sec%60);
  return 'T+'+ m + ':' + String(s).padStart(2,'0');
}
function fmtTShort(sec){
  return 'T+' + (sec/60).toFixed(1) + 'm';
}
function esc(s){ return String(s ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch])); }
function pct(sec){ return Math.max(0, Math.min(100, (sec/SIM_CONFIG.scenarioDurationSec)*100)); }

/* ============================================================
   탭 전환
   ============================================================ */
function switchTab(name){
  SIM_STATE.activeTab = name;
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  document.querySelectorAll('.tab-pane').forEach(p => {
    p.classList.toggle('active', p.id === 'pane-'+name);
  });
  // 콘텐츠 렌더
  if(name === 'overview') renderOverview();
  else if(name === 'assets') renderAssets();
  else if(name === 'threats') renderThreats();
  else if(name === 'asis') renderSimulation('asis');
  else if(name === 'tobe') renderSimulation('tobe');
  else if(name === 'compare') renderCompare();
  setTimeout(()=>{
    if((name==='asis' || name==='tobe') && SIM_MAPS[name]?.map){
      SIM_MAPS[name].map.invalidateSize();
      updateSimMap(name);
    }
  }, 120);
}

function renderAssets(){

  // 군별 그룹
  const byService = {};
  assets.forEach(a => {
    if(!byService[a.service]) byService[a.service] = [];
    byService[a.service].push(a);
  });

  // 필터링 옵션 - 군, 역할, 상태
  el.innerHTML = `
    <div class="card">
      <h2>한국 합동 방공자산 (KAMD) — 총 ${assets.length}종</h2>
      <p class="muted">탐지/요격/EW 자산. 자산별 1차 C2 노드(MCRC/KAMDOC/ADC2A/KNTDS) 매핑. 시연용 좌표는 임의값.</p>
    </div>
    <div class="asset-toolbar">
      <label>군:
        <select id="filter-service">
          <option value="">전체</option>
          ${[...new Set(assets.map(a=>a.service))].map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
      </label>
      <label>역할:
        <select id="filter-role">
          <option value="">전체</option>
          <option value="detect">탐지</option>
          <option value="intercept">요격</option>
          <option value="ew">전자전</option>
        </select>
      </label>
      <label>상태:
        <select id="filter-status">
          <option value="">전체</option>
          ${[...new Set(assets.map(a=>a.status))].map(s=>`<option value="${s}">${s}</option>`).join('')}
        </select>
      </label>
      <label>검색: <input id="filter-search" type="text" placeholder="자산명/태그" style="width:160px"/></label>

  document.getElementById('filter-role').onchange = filterAssets;
  document.getElementById('filter-status').onchange = filterAssets;
  document.getElementById('filter-search').oninput = filterAssets;
  filterAssets();
}
function filterAssets(){
  const svc = document.getElementById('filter-service').value;
  const role = document.getElementById('filter-role').value;
  const status = document.getElementById('filter-status').value;
  const q = (document.getElementById('filter-search').value || '').toLowerCase().trim();
  const grid = document.getElementById('asset-grid');
  const list = KAMD_DATA.kr_assets.filter(a => {
    if(svc && a.service !== svc) return false;
    if(role && a.primary_role !== role) return false;
    if(status && a.status !== status) return false;
    if(q && !(a.asset_name+a.asset_group+a.target_types).toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('asset-count').textContent = list.length+'건 표시';
  grid.innerHTML = list.map(a => {
    const c2 = (KAMD_DATA.c2_nodes.find(c => c.c2_id === a.c2_primary) || {}).c2_name || '—';
    const statusCls = a.status === '운용 중' ? 'active' : (a.status === '개발' || a.status === '도입예정' || a.status === '검토' || a.status === '양산예정') ? 'planned' : 'dev';
    const roleCls = 'role-' + (a.primary_role || 'unknown');
    const sskpInfo = SIM_CONFIG.sskp[a.asset_id];
    return `<div class="asset-card svc-${esc(a.service)}">
      <div class="ac-name">${esc(a.asset_name)}</div>
      <div class="ac-meta">${esc(a.asset_group)} · ${esc(a.service)}</div>
      <div class="ac-row"><b>역할</b> ${a.primary_role==='detect'?'탐지':a.primary_role==='intercept'?'요격':a.primary_role==='ew'?'전자전':a.primary_role}</div>
      <div class="ac-row"><b>고도대</b> ${esc(a.altitude_band_label || '—')}</div>
      <div class="ac-row"><b>탐지</b> ${a.detect_range_km ? a.detect_range_km+'km':'—'} · <b>요격</b> ${a.intercept_range_km ? a.intercept_range_km+'km':'—'}</div>
      <div class="ac-row"><b>대상</b> ${esc(a.target_types || '—')}</div>
      <div class="ac-row"><b>1차 C2</b> ${esc(c2)}</div>
      <div class="ac-row"><b>링크</b> <span class="small">${esc(a.data_link || '—')}</span></div>
      ${sskpInfo ? `<div class="ac-row"><b>SSKP*</b> <span class="small muted">탄도${(sskpInfo.ballistic*100).toFixed(0)} 순항${(sskpInfo.cruise*100).toFixed(0)} 전투기${(sskpInfo.aircraft*100).toFixed(0)} UAV${(sskpInfo.uav*100).toFixed(0)}</span></div>` : ''}
      <div class="ac-tags">
        <span class="tag ${statusCls}">${esc(a.status)}</span>
        <span class="tag ${roleCls}">${a.primary_role==='detect'?'탐지':a.primary_role==='intercept'?'요격':'EW'}</span>
        ${a.integration_level==='direct' ? '<span class="tag">데이터링크</span>' : a.integration_level==='limited' ? '<span class="tag planned">제한적</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

const SIM_MAP_GEO = {

  launchPoints: {

    uav:       [[38.45,126.35],[38.35,126.70],[38.55,127.10],[38.65,128.20]]
  },
  targetSites: {
    '수도권 핵심':[37.5665,126.9780],
    '평택 기지':[36.9948,127.0886],
    '수도권 산업':[37.3890,126.9550],
    '발전소':[36.9800,126.7800],
    '공군기지':[36.6330,127.4900],
    '레이더 사이트':[36.8000,128.2000],
    '군사시설':[37.3500,127.1000],
    '정찰 표적':[37.7000,127.2000],
    '발전소(예비)':[35.9000,129.3800],

  },
  typeColor: {ballistic:'#ef5350', cruise:'#ff9800', aircraft:'#42a5f5', uav:'#26c6da'},
  typeText: {ballistic:'탄도탄', cruise:'순항', aircraft:'전투기', uav:'UAV'}
};
function stableHash(str){
  let h=2166136261>>>0;
  for(let i=0;i<String(str).length;i++){ h^=String(str).charCodeAt(i); h=Math.imul(h,16777619); }
  return h>>>0;
}
function seededUnit(key){
  const h = stableHash(`${SIM_STATE.seed}:${key}`);
  return (h % 100000) / 100000;
}
function jitterCoord(coord, key, scale=0.11){
  const j1 = seededUnit(key+'a') - 0.5;
  const j2 = seededUnit(key+'b') - 0.5;
  return [coord[0] + j1*scale, coord[1] + j2*scale];
}
function getTrackRoute(track){
  const starts = SIM_MAP_GEO.launchPoints[track.type] || SIM_MAP_GEO.launchPoints.cruise;
  const baseStart = starts[stableHash(track.id) % starts.length];
  const baseTarget = SIM_MAP_GEO.targetSites[track.target] || [37.2,127.1];
  return {
    start: jitterCoord(baseStart, track.id+'start', 0.18),
    target: jitterCoord(baseTarget, track.id+'target', 0.14)
  };
}
function interpLatLng(a,b,p){
  const x = Math.max(0, Math.min(1, p));
  return [a[0] + (b[0]-a[0])*x, a[1] + (b[1]-a[1])*x];
}
function getEventsForTrack(mode, trackId){
  const data = SIM_STATE[mode];
  if(!data) return [];
  return data.events.filter(e=>e.trackId===trackId).sort((a,b)=>a.t-b.t);
}
function getTrackMapState(mode, track, t){
  const evs = getEventsForTrack(mode, track.id);
  const past = evs.filter(e=>e.t<=t);
  const finalEv = past.find(e=>e.final);
  const last = past[past.length-1];
  const route = getTrackRoute(track);
  let calcT = t;
  if(finalEv && finalEv.success) calcT = finalEv.t;
  if(finalEv && !finalEv.success) calcT = Math.min(finalEv.t, track.arrivalT);
  const progress = (calcT - track.launchT) / Math.max(1, (track.arrivalT - track.launchT));
  const pos = interpLatLng(route.start, route.target, progress);
  const launched = t >= track.launchT;
  let status = '대기';
  let cls = 'wait';
  if(launched) { status='비행 중'; cls='active'; }
  if(last?.kind==='ev-detect') status='탐지';
  if(last?.kind==='ev-track') status='트랙';
  if(last?.kind==='ev-classify') status='분류';
  if(last?.kind==='ev-decide') status='결심';
  if(last?.kind==='ev-assign') status='자산할당';
  if(last?.kind==='ev-order') status='명령';
  if(last?.kind==='ev-engage') status='교전';
  if(finalEv){ status = finalEv.success ? '격추' : '도달/실패'; cls = finalEv.success ? 'success' : 'fail'; }
  const visible = launched || past.length>0;
  return {route, pos, progress:Math.max(0,Math.min(1,progress)), status, cls, visible, last, finalEv};
}
function makeDivIcon(kind, label, color, extra=''){
  return L.divIcon({
    className:'asbs-div-icon',
    html:`<div class="asbs-map-marker ${kind} ${extra}" style="background:${color}; color:${color}"><span style="color:#fff">${label||''}</span></div>`,

function c2ShortName(c2){
  return (c2.c2_name||'C2').replace('KAMDOC','KAOC').slice(0,5);
}
function assetColor(asset){
  if(asset.service==='공군') return '#4FC3F7';
  if(asset.service==='육군') return '#66BB6A';
  if(asset.service==='해군') return '#5C6BC0';
  if(asset.service==='주한미군') return '#FF7043';
  if(asset.service==='합동') return '#FFEB3B';

function renderStaticMapLayers(mode){

function updateSimMap(mode){
  const st = SIM_MAPS[mode];
  if(!st || !SIM_STATE[mode]) return;
  const t = SIM_STATE.currentTime;
  const data = SIM_STATE[mode];
  st.threatLayer.clearLayers();
  let active=0, success=0, fail=0, detected=0;
  const activeItems=[];
  data.tracks.forEach(track=>{
    const ms = getTrackMapState(mode, track, t);
    if(!ms.visible && t < 10) return;
    if(ms.finalEv?.success) success++;
    else if(ms.finalEv && !ms.finalEv.success) fail++;
    else if(ms.visible) active++;
    if(ms.last && ['ev-detect','ev-track','ev-classify','ev-decide','ev-assign','ev-order','ev-engage'].includes(ms.last.kind)) detected++;
    const color = ms.finalEv?.success ? '#66bb6a' : (ms.finalEv ? '#ef5350' : SIM_MAP_GEO.typeColor[track.type]);
    // 경로: 전체 예정선 + 현재까지 진행선
    if(ms.visible){
      L.polyline([ms.route.start, ms.route.target], {color:SIM_MAP_GEO.typeColor[track.type], weight:1, opacity:.18, dashArray:'5 6'}).addTo(st.threatLayer);
      L.polyline([ms.route.start, ms.pos], {color, weight:3, opacity:.72}).addTo(st.threatLayer);
      const markerLabel = track.type==='ballistic'?'B':track.type==='cruise'?'C':track.type==='aircraft'?'F':'U';
      const marker = L.marker(ms.pos, {icon:makeDivIcon('threat', markerLabel, color, ms.cls)}).bindPopup(
        `<div class="map-popup"><b>${track.id} · ${SIM_MAP_GEO.typeText[track.type]}</b><div class="muted">${esc(track.threatModel)} → ${esc(track.target)}</div><div class="row"><span>상태</span><span>${esc(ms.status)}</span></div><div class="row"><span>도달 예정</span><span>${fmtT(track.arrivalT)}</span></div><div class="row"><span>최근 이벤트</span><span>${esc(ms.last?.text || '비행 중')}</span></div><div class="row"><span>결과</span><span>${ms.finalEv ? (ms.finalEv.success?'격추':'도달/실패') : '진행 중'}</span></div></div>`
      );
      marker.on('click', ()=>openTrackDetail(mode, track.id));
      st.threatLayer.addLayer(marker);
      if(!ms.finalEv && activeItems.length<9){
        activeItems.push({track, ms});
      }
    }
  });
  const meta = document.getElementById('sim-map-meta-'+mode);
  if(meta) meta.innerHTML = `${fmtT(t)}<br>${mode==='asis'?'C2별 분절 화면':'KAOC 통합 COP'} · 활성 ${active} / 격추 ${success} / 도달 ${fail}`;
  const side = document.getElementById('sim-map-side-'+mode);
  if(side){
    const voiceCount = data.events.filter(e=>e.t<=t && e.kind==='ev-voice').length;
    const dupCount = data.events.filter(e=>e.t<=t && e.dup).length;
    side.innerHTML = `
      <div class="map-note">지도는 시연용 임의좌표입니다. 위협 표식은 현재 시간의 추정 위치이며, 선은 발사점→표적의 단순 보간 경로입니다.</div>
      <div>
        <h3>${mode==='asis'?'As-Is 지도 진단':'To-Be 통합 COP'}</h3>
        <div class="sim-map-stat-grid">
          <div class="sim-map-stat warn"><div class="k">활성 항적</div><div class="v">${active}</div></div>
          <div class="sim-map-stat good"><div class="k">격추</div><div class="v">${success}</div></div>
          <div class="sim-map-stat bad"><div class="k">도달/실패</div><div class="v">${fail}</div></div>
          <div class="sim-map-stat"><div class="k">음성/VTC</div><div class="v">${voiceCount}</div></div>
          <div class="sim-map-stat"><div class="k">탐지/교전 중</div><div class="v">${detected}</div></div>
          <div class="sim-map-stat ${dupCount?'warn':''}"><div class="k">중복교전</div><div class="v">${dupCount}</div></div>
        </div>
      </div>
      <div>
        <h3>범례</h3>
        <div class="sim-map-legend">
          <span><i style="background:#ef5350"></i>탄도탄</span><span><i style="background:#ff9800"></i>순항</span>
          <span><i style="background:#42a5f5"></i>전투기</span><span><i style="background:#26c6da"></i>무인기</span>
          <span><i style="background:#66bb6a"></i>격추</span><span><i style="background:#ef5350;box-shadow:0 0 8px #ef5350"></i>도달/실패</span>
          <span><i style="background:#4FC3F7"></i>공군자산</span><span><i style="background:#66BB6A"></i>육군자산</span>
        </div>
      </div>
      <div>
        <h3>현재 관심 항적</h3>
        <div class="sim-map-track-list">
          ${activeItems.length ? activeItems.map(({track,ms})=>`<div class="sim-map-track-item ${track.type}" onclick="openTrackDetail('${mode}','${track.id}')"><div class="top"><span>${track.id} · ${SIM_MAP_GEO.typeText[track.type]}</span><span>${fmtT(track.arrivalT)}</span></div><div class="bottom">${esc(ms.status)} · ${esc(track.target)}<br>${esc(ms.last?.actor || '—')} ${esc(ms.last?.text || '')}</div></div>`).join('') : '<div class="muted small">현재 표시할 활성 항적이 없습니다.</div>'}
        </div>
      </div>
      <div class="map-note">${mode==='asis'?'As-Is는 C2별 인지 차이와 음성/VTC 이벤트 증가, AOR 중복교전을 지도와 로그에서 함께 확인하도록 구성했습니다.':'To-Be는 모든 자산·교전 정보를 KAOC 통합 COP에서 하나의 지도 화면으로 확인하는 가정입니다.'}</div>
    `;
  }
  setTimeout(()=>st.map.invalidateSize(), 20);
}



/* ============================================================
   C2 흐름 문제점 시각화 — 시간 연동 동적 패널
   ============================================================ */
function getModeSnapshot(mode){
  const data = SIM_STATE[mode];
  const t = SIM_STATE.currentTime;
  const evs = data ? data.events.filter(e=>e.t<=t) : [];
  const tracks = data ? data.tracks : [];
  const state = {};
  evs.forEach(e=>{
    if(e.trackId==='SYS') return;
    if(!state[e.trackId]) state[e.trackId] = {events:[]};
    state[e.trackId].events.push(e);
    state[e.trackId].last = e;
    if(e.final){ state[e.trackId].final = e; state[e.trackId].success = e.success===true; }
  });
  const active = tracks.filter(tr=>state[tr.id] && !state[tr.id].final).length;
  const detected = tracks.filter(tr=>state[tr.id]).length;
  const success = tracks.filter(tr=>state[tr.id]?.success===true).length;
  const fail = tracks.filter(tr=>state[tr.id]?.final && !state[tr.id]?.success).length;
  const voice = evs.filter(e=>e.kind==='ev-voice').length;
  const dataMsg = evs.filter(e=>['ev-detect','ev-track','ev-classify','ev-decide','ev-assign','ev-order','ev-engage','ev-bda-success','ev-bda-fail'].includes(e.kind)).length;
  const dup = evs.filter(e=>e.dup).length;
  const waiting = tracks.filter(tr=>{
    const last = state[tr.id]?.last;
    return last && !state[tr.id]?.final && ['ev-classify','ev-wait','ev-voice'].includes(last.kind);
  }).length;
  const kaocDecisions = evs.filter(e=>e.mode==='verify' && e.kind==='ev-decide').length;
  const preauth = evs.filter(e=>e.mode==='preauth' && e.kind==='ev-decide').length;
  const auto = evs.filter(e=>e.mode==='auto' && e.kind==='ev-decide').length;
  const delegate = evs.filter(e=>e.mode==='delegate' && e.kind==='ev-decide').length;
  return {t, evs, tracks, state, active, detected, success, fail, voice, dataMsg, dup, waiting, kaocDecisions, preauth, auto, delegate};
}

/* ============================================================
   킬체인 간트차트 렌더
   ============================================================ */
function renderKillchain(mode){
  const data = SIM_STATE[mode];
  const grid = document.getElementById('kc-grid-'+mode);
  if(!grid) return;
  const tracks = data.tracks;
  const events = data.events;

  // 시간 축 (0~30분, 5분 단위 눈금)
  const axisDuration = SIM_CONFIG.scenarioDurationSec;
  const axisHtml = [];
  for(let m = 0; m <= 30; m += 5){
    const p = (m*60/axisDuration)*100;
    axisHtml.push(`<div class="kc-time-tick" style="left:${p}%">T+${m}m</div>`);
  }
  axisHtml.push(`<div class="kc-time-now" id="kc-time-now-${mode}" style="left:${pct(SIM_STATE.currentTime)}%; margin-left:200px"></div>`);

  // 항적별 이벤트 그룹화
  const byTrack = {};
  events.forEach(e => {
    if(e.trackId === 'SYS') return;
    if(!byTrack[e.trackId]) byTrack[e.trackId] = [];
    byTrack[e.trackId].push(e);
  });

  // 항적은 ID 순으로 정렬 (T-01 ~ T-30)
  const rows = tracks.map(tr => {
    const evs = (byTrack[tr.id] || []).sort((a,b)=>a.t-b.t);
    // 각 이벤트를 시간 위치로 변환
    const evHtml = evs.map((e,i) => {
      const tStart = e.t;
      const next = evs[i+1];
      // 막대 너비: 다음 이벤트까지의 시간, 최소 20초 너비
      let tEnd = next ? next.t : Math.min(tStart + 40, axisDuration);
      if(e.final) tEnd = Math.min(tStart + 30, axisDuration);
      const left = (tStart/axisDuration)*100;
      const width = Math.max(0.6, ((tEnd - tStart)/axisDuration)*100);
      const evKind = e.kind;
      const txt = (e.text || '').slice(0,30);
      return `<div class="kc-event ${evKind}" style="left:${left}%; width:${width}%" data-t="${tStart.toFixed(0)}" title="${fmtT(tStart)} | ${esc(e.actor||'')} | ${esc(e.text||'')}">${esc(txt)}</div>`;
    }).join('');
    return `<div class="kc-row t-${tr.type}" data-track-id="${tr.id}" onclick="openTrackDetail('${mode}','${tr.id}')">
      <div class="kc-label">
        <span class="kc-id">${tr.id}</span>
        <span class="kc-type t-${tr.type}">${tr.label}</span>
        <span class="kc-target">→ ${esc(tr.target)}</span>
      </div>
      <div class="kc-bar-area">${evHtml}</div>
    </div>`;
  }).join('');

  grid.innerHTML = `
    <div class="kc-time-axis">${axisHtml.join('')}</div>
    ${rows}
  `;
}

function updateSimViews(){
